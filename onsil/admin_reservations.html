<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">
    <!-- Navbar -->

                    <i class="fas fa-calendar-check"></i> ?Ҳм•Ҫ?ҳкё°

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">?Ҳм•Ҫ кҙҖлҰ?/h1>

            </div>
            <button onclick="loadReservations()"
                class="inline-flex items-center gap-2 bg-white border px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors shadow-sm">
                <i class="fas fa-sync-alt"></i> ?ҲлЎңкі м№Ё

        </div>

        <!-- Reservation List -->
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">? мІӯ?јмӢң</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">?Ҙл??қмһҘ</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">?Ҳм•Ҫ ?јм •</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">? нғқ ?ңл№„??/th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">л°ҳл Ө?ҷл¬ј ?•ліҙ</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">ліҙнҳё???°лқҪмІ?/th>

                        </tr>
                    </thead>
                    <tbody id="reservation-list" class="divide-y divide-gray-100">
                        <!-- Items injected here -->
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-400">?°мқҙ?°л? л¶Ҳлҹ¬?ӨлҠ” мӨ?..</td>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Role check before loading content
        async function checkAdminAccess() {
            try {
                const user = await Auth.getCurrentUser();
                if (!user || user.role !== 'admin') {
                    alert('кҙҖлҰ¬мһҗ к¶Ңн•ң???„мҡ”?©лӢҲ??');
                    location.href = 'index.html';
                }
            } catch (err) {
                console.error('Access check failed:', err);
                location.href = 'index.html';
            }
        }
        checkAdminAccess();

        async function loadReservations() {
            const listContainer = document.getElementById('reservation-list');

            try {
                const sb = Auth.getSupabase();
                if (!sb) throw new Error("?ңлІ„ ?°кІ° ?ӨнҢЁ");

                const user = await Auth.getCurrentUser();
                if (!user) throw new Error("лЎңк·ё?ёмқҙ ?„мҡ”?©лӢҲ??");

                const { data, error } = await sb
                    .from('reservations')
                    .select('*')
                    .eq('user_id', user.id) // ліёмқё???°мқҙ?°л§Ң ?„н„°л§?(ліҙм•Ҳ к°•нҷ”)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    listContainer.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">?‘мҲҳ???Ҳм•Ҫ ?ҙм—ӯ???ҶмҠө?ҲлӢӨ.</td></tr>';
                    return;
                }

                listContainer.innerHTML = data.map(res => {
                    const date = new Date(res.created_at).toLocaleString();
                    const defaultPrices = {
                        'кё°ліё??: '250,000??,
                        'кі кёү??: '450,000??,
                        'VIP??: '850,000??
                    };
                    const priceDisplay = res.service_price || defaultPrices[res.selected_service] || '';

                    return `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">${date}</td>
                            <td class="px-6 py-4">
                                <span class="font-bold text-gray-900">${res.facility_name}</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm">
                                    <p class="font-bold text-primary">${res.reservation_date}</p>
                                    <p class="text-gray-500">${res.reservation_time}</p>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1">
                                    <span class="px-3 py-1 bg-accent/10 text-accent rounded-full text-xs font-bold border border-accent/20 w-fit">
                                        ${res.selected_service || 'лҜём„ ??}
                                    </span>
                                    ${priceDisplay ? `<span class="text-[10px] text-gray-400 font-bold ml-1">${priceDisplay}</span>` : ''}
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm">
                                    <span class="px-2 py-0.5 bg-onsil/10 text-onsil rounded text-xs font-bold mr-1">${res.pet_type}</span>
                                    <span class="font-bold">${res.pet_name}</span>
                                    <span class="text-gray-400">(${res.pet_weight}kg)</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 font-mono text-sm">${res.user_phone}</td>
                            <td class="px-6 py-4">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-800">
                                    ?‘мҲҳ?„лЈҢ
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                listContainer.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-red-500">?°мқҙ??лЎңл“ң ?ӨнҢЁ: ${err.message}</td></tr>`;
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', loadReservations);
    </script>
</body>

</html>
