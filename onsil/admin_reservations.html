        async function loadReservations() {
            const listContainer = document.getElementById('reservation-list');
            try {
                const sb = Auth.getSupabase();
                if (!sb) throw new Error("?�버 ?�결 ?�패");

                const user = await Auth.getCurrentUser();
                if (!user) throw new Error("로그?�이 ?�요?�니??");

                // Dashboard Title & Facility Select Fix
                const facilitySelect = document.getElementById('res-facility');
                if (user.role === 'partner' && user.facility) {
                    document.getElementById('dashboard-title').textContent = `${user.facility} 관�??�?�보??;
                    // ?�트?�는 본인 ?�설�??�택 가?�하?�록 ?�한
                    facilitySelect.innerHTML = `<option value="${user.facility}">${user.facility}</option>`;
                    facilitySelect.value = user.facility;
                }

                let query = sb.from('reservations').select('*');

                // Role-based filtering
                if (user.role === 'partner') {
                    if (user.facility) {
                        query = query.eq('facility_name', user.facility);
                    } else {
                        throw new Error("?�당???�설 ?�보가 ?�습?�다. 관리자?�게 문의?�세??");
                    }
                }

                const { data, error } = await query.order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    listContainer.innerHTML = '<tr><td colspan="7" class="px-6 py-20 text-center text-gray-400">?�록???�약 ?�역???�습?�다.</td></tr>';
                    return;

        async function sendAlimtalk(resData) {

                if (error) throw error;
                console.log("Alimtalk Sent Result (Admin):", data);

                // 중복 ?�약 검�?
                const { data: existRes, error: checkErr } = await sb
                    .from('reservations')
                    .select('id')
                    .eq('facility_name', payload.facility_name)

                alert('?�록 ?�류: ' + err.message);
