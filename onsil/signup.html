<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - The 온실</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1B2B48">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: "#1B2B48" },
                        secondary: { DEFAULT: "#FAFAFA" },
                        accent: { DEFAULT: "#C5A065" },
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                        serif: ['Nanum Myeongjo', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
    </style>
</head>

<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">


    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-8">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex flex-col items-center gap-3 group">
                <img src="./images/onsil_logo_tr.png" width="80" height="80" class="w-20 h-20 object-contain transition-transform group-hover:scale-105" alt="온실 캐릭터 로고">
                <span class="text-3xl font-bold text-[#1B2B48]">The 온실</span>
            </a>
            <p class="text-gray-500 text-sm mt-4">회원가입하고 The 온실의 서비스를 이용해보세요.</p>
        </div>

        <form id="signup-form" class="space-y-6" onsubmit="return false;">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">이름 <span class="text-red-500">*</span></label>
                <input type="text" id="name" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="홍길동">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">이메일 <span class="text-red-500">*</span></label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="example@email.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">비밀번호 <span class="text-red-500">*</span></label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="••••••••">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">성별 <span class="text-red-500">*</span></label>
                    <div class="flex gap-2">
                        <button type="button" onclick="setGender('male')" id="gender-male"
                            class="flex-1 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-all font-medium gender-btn">
                            남
                        </button>
                        <button type="button" onclick="setGender('female')" id="gender-female"
                            class="flex-1 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-all font-medium gender-btn">
                            여
                        </button>
                    </div>
                    <input type="hidden" id="gender" required>
                </div>
                <div>
                    <label for="birth-year" class="block text-sm font-medium text-gray-700 mb-1">출생년도 <span class="text-red-500">*</span></label>
                    <input type="number" id="birth-year" required min="1900" max="2026"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                        placeholder="예: 1990">
                </div>
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
                    휴대폰 번호 <span class="text-red-500">*</span> 
                    <span class="text-xs text-red-500 ml-1 font-normal tracking-tight">(- 없이 숫자만 입력)</span>
                </label>
                <div class="flex gap-2">
                    <input type="tel" id="phone" required pattern="[0-9]+" maxlength="11"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        class="flex-1 px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                        placeholder="01012345678">
                    <button type="button" id="verify-btn"
                        class="px-4 py-3 bg-[#1B2B48] text-white rounded-lg font-bold text-sm whitespace-nowrap hover:bg-[#2a4269] transition-all disabled:opacity-50">
                        본인인증
                    </button>
                </div>
                <p id="verify-status" class="hidden text-xs text-green-600 mt-1 font-bold">
                    <i class="fas fa-check-circle"></i> 본인인증이 완료되었습니다.
                </p>
            </div>

            <div>
                <label for="location" class="block text-sm font-medium text-gray-700 mb-1">거주 지역 <span class="text-red-500">*</span></label>
                <select id="location" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black bg-white">
                    <option value="" disabled selected>지역을 선택해주세요</option>
                    <option value="서울">서울</option>
                    <option value="경기">경기</option>
                    <option value="인천">인천</option>
                    <option value="강원">강원</option>
                    <option value="충북">충북</option>
                    <option value="충남">충남</option>
                    <option value="대전">대전</option>
                    <option value="세종">세종</option>
                    <option value="전북">전북</option>
                    <option value="전남">전남</option>
                    <option value="광주">광주</option>
                    <option value="경북">경북</option>
                    <option value="경남">경남</option>
                    <option value="대구">대구</option>
                    <option value="울산">울산</option>
                    <option value="부산">부산</option>
                    <option value="제주">제주</option>
                </select>
            </div>

            <div class="space-y-4 pt-4 border-t">
                <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl border border-gray-200 cursor-pointer" onclick="toggleAllAgree()">
                    <input type="checkbox" id="agree-all" class="w-5 h-5 rounded accent-[#1B2B48] pointer-events-none">
                    <span class="text-sm font-bold text-gray-700">약관 전체 동의하기</span>
                </div>
                
                <div class="space-y-3 px-1">
                    <div class="flex items-center justify-between group">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="agree-terms" required class="agree-item w-4 h-4 rounded accent-[#1B2B48]">
                            <span class="text-sm text-gray-600">[필수] 이용약관 동의</span>
                        </label>
                        <button type="button" onclick="showPolicy('terms')" class="text-xs text-gray-400 hover:text-gray-600 underline">보기</button>
                    </div>
                    <div class="flex items-center justify-between group">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="agree-privacy" required class="agree-item w-4 h-4 rounded accent-[#1B2B48]">
                            <span class="text-sm text-gray-600">[필수] 개인정보 처리방침 동의</span>
                        </label>
                        <button type="button" onclick="showPolicy('privacy')" class="text-xs text-gray-400 hover:text-gray-600 underline">보기</button>
                    </div>
                    <div class="flex items-center justify-between group">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="agree-marketing" class="agree-item w-4 h-4 rounded accent-[#1B2B48]">
                            <span class="text-sm text-gray-600">[선택] 마케팅 정보 수신 동의</span>
                        </label>
                        <button type="button" onclick="showPolicy('marketing')" class="text-xs text-gray-400 hover:text-gray-600 underline">보기</button>
                    </div>
                </div>
            </div>

            <button type="submit" id="signup-btn" onclick="handleSignup()"
                class="w-full py-4 bg-[#1B2B48] text-white rounded-xl font-bold text-lg shadow-lg hover:bg-[#2a4269] transition-all hover:-translate-y-0.5 active:translate-y-0">
                가입하기
            </button>
        </form>

        <div class="mt-8 text-center space-y-4">
            <p class="text-gray-500 text-sm">이미 회원이신가요? <a href="login.html" class="text-[#1B2B48] font-bold hover:underline">로그인</a></p>
        </div>
    </div>

    <!-- Modal for Policies -->
    <div id="policy-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 id="policy-title" class="font-bold text-lg text-gray-900">약관 상세</h3>
                <button onclick="closePolicy()" class="text-gray-400 hover:text-gray-900 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="policy-content" class="p-8 max-h-[60vh] overflow-y-auto text-sm text-gray-600 leading-relaxed space-y-4">
                <!-- Content will be injected here -->
            </div>
            <div class="p-6 border-t bg-gray-50 text-right">
                <button onclick="closePolicy()" class="bg-[#1B2B48] text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-[#2a4269] transition-all">확인</button>
            </div>
        </div>
    </div>

    <!-- Supabase & Auth Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script src="js/auth.js"></script>


    <script>
        function toggleAllAgree() {
            const agreeAll = document.getElementById('agree-all');
            const items = document.querySelectorAll('.agree-item');
            agreeAll.checked = !agreeAll.checked;
            items.forEach(item => item.checked = agreeAll.checked);
        }

        document.addEventListener('change', (e) => {
            if (e.target.classList.contains('agree-item')) {
                const agreeAll = document.getElementById('agree-all');
                const items = document.querySelectorAll('.agree-item');
                const checked = document.querySelectorAll('.agree-item:checked');
                agreeAll.checked = items.length === checked.length;
            }
        });

        const POLICY_DATA = {
            terms: `
                <h4 class="font-bold text-gray-900">[서비스 이용약관]</h4>
                <p>제 1 조 (목적)<br>본 약관은 The 온실이 제공하는 모든 서비스의 이용조건 및 절차, 회원 및 회사의 권리와 의무 등을 규정함을 목적으로 합니다.</p>
                <p>제 2 조 (회원가입)<br>회원가입은 본 약관에 동의하고 회사가 요청하는 정보를 정확히 기입하여 가입을 신청함으로써 완료됩니다.</p>
                <p>제 3 조 (서비스의 제공)<br>회사는 회원에게 반려동물 장례 예약 및 상담, 추모 가이드 제공 등 관련된 서비스를 제공합니다.</p>
                <p>제 4 조 (취소 및 환불)<br>예약 취소 시 환불 기준은 예약일로부터의 남은 기간에 따라 차등 적용됩니다 (2일 전~당일 환불 불가).</p>
            `,
            privacy: `
                <h4 class="font-bold text-gray-900">[개인정보 처리방침]</h4>
                <p>1. 수집 항목: 이름, 이메일, 성별, 출생년도, 전화번호, 반려동물 정보.</p>
                <p>2. 수집 목적: 회원 식별, 서비스 예약 접수 및 안내, 상담 서비스 제공.</p>
                <p>3. 보유 기간: 회원 탈퇴 시까지 또는 법령에서 정한 보존 기간까지.</p>
                <p>4. 동의 거부권: 이용자는 개인정보 수집에 대한 동의를 거부할 수 있으나, 가입 및 예약 서비스 이용이 제한될 수 있습니다.</p>
            `,
            marketing: `
                <h4 class="font-bold text-gray-900">[마케팅 정보 수신 동의]</h4>
                <p>회사는 서비스 이용자에게 최적화된 혜택과 정보를 제공하기 위해 아래와 같이 마케팅 정보를 활용합니다.</p>
                <p>1. 활용 목적: 신규 서비스 안내, 이벤트 및 프로모션 정보 발송, 이용 통계 분석.</p>
                <p>2. 수신 수단: 이메일, SMS, 앱 푸시 알림.</p>
                <p>3. 철회 방법: 마이페이지 설정 또는 고객센터를 통해 언제든지 동의를 철회할 수 있습니다.</p>
            `
        };

        function showPolicy(type) {
            const modal = document.getElementById('policy-modal');
            const title = document.getElementById('policy-title');
            const content = document.getElementById('policy-content');
            
            const titles = { terms: '이용약관 상세', privacy: '개인정보 처리방침', marketing: '마케팅 정보 활용 동의' };
            
            title.innerText = titles[type] || '약관 상세';
            content.innerHTML = POLICY_DATA[type] || '내용을 불러올 수 없습니다.';
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePolicy() {
            document.getElementById('policy-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function setGender(gender) {
            document.getElementById('gender').value = gender;
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('bg-[#1B2B48]', 'text-white', 'border-[#1B2B48]');
                btn.classList.add('border-gray-300', 'text-gray-600');
            });
            const selected = document.getElementById('gender-' + gender);
            selected.classList.remove('border-gray-300', 'text-gray-600');
            selected.classList.add('bg-[#1B2B48]', 'text-white', 'border-[#1B2B48]');
        }

        let isVerified = false;

        document.getElementById('verify-btn').onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!name || !phone) {
                alert('이름과 휴대폰 번호를 먼저 입력해 주세요.');
                return;
            }

            try {
                const btn = document.getElementById('verify-btn');
                btn.disabled = true;
                btn.innerText = '인증 중...';

                const res = await Auth.requestIdentityVerification({
                    fullName: name,
                    phoneNumber: phone,
                    email: email
                });

                if (res.success) {
                    isVerified = true;
                    document.getElementById('verify-status').classList.remove('hidden');
                    document.getElementById('phone').disabled = true;
                    btn.classList.add('hidden');
                    alert('본인인증이 완료되었습니다.');
                } else {
                    alert(res.message || '본인인증에 실패했습니다.');
                }
            } catch (err) {
                alert('오류 발생: ' + err.message);
            } finally {
                const btn = document.getElementById('verify-btn');
                if (!isVerified) {
                    btn.disabled = false;
                    btn.innerText = '본인인증';
                }
            }
        };

        async function handleSignup() {
            if (!isVerified) {
                alert('휴대폰 본인인증을 먼저 완료해 주세요.');
                return;
            }

            const submitBtn = document.getElementById('signup-btn');
            const originalBtnText = submitBtn.innerText;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = '처리 중...';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const name = document.getElementById('name').value.trim();
                const gender = document.getElementById('gender').value;
                const birthYear = document.getElementById('birth-year').value;
                const phone = document.getElementById('phone').value.trim().replace(/-/g, '');
                const location = document.getElementById('location').value;
                const marketingAgree = document.getElementById('agree-marketing').checked; // 마케팅 동의 여부

                if (!email || !password || !name || !gender || !birthYear || !phone || !location) {
                    throw new Error('모든 필수 필드를 입력해 주세요.');
                }

                // 필수 약관 동의 확인
                if (!document.getElementById('agree-terms').checked || !document.getElementById('agree-privacy').checked) {
                    throw new Error('필수 약관에 동의해 주세요.');
                }

                const res = await Auth.signup(email, password, name, gender, birthYear, phone, location, marketingAgree);


                if (res.success) {
                    alert('회원가입이 완료되었습니다. 이메일 인증이 필요할 수 있습니다.\n확인 후 로그인해 주세요.');
                    window.location.href = 'login.html';
                } else {
                    throw new Error(res.message);
                }

            } catch (error) {
                console.error('Signup Error:', error);
                let msg = error.message;
                if (msg.includes('rate limit')) msg = "너무 많은 가입 시도로 인해 일시적으로 차단되었습니다.";
                else if (msg.includes('already registered')) msg = "이미 가입된 이메일입니다.";
                alert('오류 발생: ' + msg);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        } else if (window.location.protocol === 'file:') {
            console.warn('Onsil: PWA features (Service Worker) are disabled on file:// protocol.');
        }
    </script>
    <script src="js/channel-talk.js"></script>
</body>

</html>
