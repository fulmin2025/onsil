    <!-- Supabase & Auth Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        function setGender(gender) {
            document.getElementById('gender').value = gender;
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('bg-[#1B2B48]', 'text-white', 'border-[#1B2B48]');
                btn.classList.add('border-gray-300', 'text-gray-600');
            });
            const selected = document.getElementById('gender-' + gender);
            selected.classList.remove('border-gray-300', 'text-gray-600');
            selected.classList.add('bg-[#1B2B48]', 'text-white', 'border-[#1B2B48]');
        }

        async function handleSignup() {
            const submitBtn = document.getElementById('signup-btn');
            const originalBtnText = submitBtn.innerText;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'мІҳлҰ¬ мӨ?..';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const name = document.getElementById('name').value.trim();
                const gender = document.getElementById('gender').value;
                const birthYear = document.getElementById('birth-year').value;
                const phone = document.getElementById('phone').value.trim();

                if (!email || !password || !name || !gender || !birthYear || !phone) {
                    throw new Error('лӘЁл“  ?„л“ңлҘ??…л Ҙ??мЈјм„ё??');
                }

                // Use centralized Auth logic
                const res = await Auth.signup(email, password, name, gender, birthYear, phone);

                if (res.success) {
                    alert('?Ңмӣҗк°Җ?…мқҙ ?„лЈҢ?ҳм—Ҳ?өлӢҲ?? ?ҙл©”???ёмҰқ???„мҡ”?????ҲмҠө?ҲлӢӨ.\n?•мқё ??лЎңк·ё?ён•ҙ мЈјм„ё??');
                    window.location.href = 'login.html';
                } else {
                    throw new Error(res.message);
                }

            } catch (error) {
                console.error('Signup Error:', error);
                let msg = error.message;
                if (msg.includes('rate limit')) msg = "?Ҳл¬ҙ л§Һм? к°Җ???ңлҸ„лЎ??ён•ҙ ?јмӢң?ҒмңјлЎ?м°ЁлӢЁ?ҳм—Ҳ?өлӢҲ??";
                else if (msg.includes('already registered')) msg = "?ҙл? к°Җ?…лҗң ?ҙл©”?јмһ…?ҲлӢӨ.";
                alert('?ӨлҘҳ л°ңмғқ: ' + msg);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        }

        async function handleKakaoLogin() {
            try {
                const client = Auth.getSupabase();
                if (!client) throw new Error('?ёмҰқ ?ңл№„???°кІ° ?ӨнҢЁ');

                const { data, error } = await client.auth.signInWithOAuth({
                    provider: 'kakao',
                    options: {
                        redirectTo: window.location.origin + '/index.html'
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Kakao Login Error:', error);
                alert('м№ҙм№ҙ??лЎңк·ё??мӨ??ӨлҘҳк°Җ л°ңмғқ?ҲмҠө?ҲлӢӨ.');
            }
        }
    </script>
