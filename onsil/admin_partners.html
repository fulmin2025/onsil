<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex flex-col">

                    <span class="font-bold text-lg text-brand tracking-tight">The ?ЁмӢӨ <span class="text-xs font-black text-red-500 ml-1">ADMIN</span></span>
                </a>
                <div class="h-6 w-px bg-gray-200 mx-2"></div>

                <button onclick="Auth.logout()" class="text-sm font-bold text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-all">лЎңк·ё?„мӣғ</button>

    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-24">
        <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-black text-gray-900 mb-2">?…м җ ? мІӯ ?ҙм—ӯ</h2>
                <p class="text-sm text-gray-500 font-medium">?№мқё ?Җкё?мӨ‘мқё ? к·ң ?ҢнҠё??лӘ©лЎқ?…лӢҲ??</p>
            </div>
            <button onclick="loadPendingPartners()" class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 transition-all shadow-sm">
                <i class="fas fa-sync-alt"></i> ?ҲлЎңкі м№Ё

        </div>

        <!-- Pending List Table -->
        <div class="bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                            <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">? мІӯ ?јмӢң</th>
                            <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">?Ҙл??қмһҘлӘ?/th>
                            <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">?ҙлӢ№??/ ?°лқҪмІ?/th>
                            <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest text-center">?ҷмһ‘</th>
                        </tr>
                    </thead>
                    <tbody id="pending-list" class="divide-y divide-gray-50">
                        <!-- Content will be rendered here -->
                        <tr>
                            <td colspan="4" class="px-8 py-20 text-center text-gray-400">
                                <i class="fas fa-spinner fa-spin text-2xl mb-4"></i>
                                <p class="text-sm font-medium">?°мқҙ?°л? л¶Ҳлҹ¬?ӨлҠ” мӨ‘мһ…?ҲлӢӨ...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js?v=2"></script>
    <script>
        // Security Check
        async function checkAdmin() {
            const user = await Auth.getCurrentUser();
            if (!user || (user.role !== 'admin' && user.email !== 'fulmin@nate.com')) {
                alert('кҙҖлҰ¬мһҗ к¶Ңн•ң???„мҡ”?©лӢҲ??');
                location.href = 'partner-login.html';
                return;
            }
            loadPendingPartners();
        }

        async function loadPendingPartners() {
            const listContainer = document.getElementById('pending-list');
            const partners = await Auth.getPendingPartners();

            if (partners.length === 0) {
                listContainer.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-8 py-20 text-center">
                            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                                <i class="fas fa-inbox text-2xl"></i>
                            </div>
                            <p class="text-sm font-bold text-gray-400 uppercase tracking-tighter italic">?„мһ¬ ?№мқё ?Җкё?мӨ‘мқё ? мІӯ кұҙмқҙ ?ҶмҠө?ҲлӢӨ.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            listContainer.innerHTML = partners.map(p => `
                <tr class="hover:bg-gray-50/50 transition-colors group">
                    <td class="px-8 py-6">
                        <span class="text-sm font-medium text-gray-400">${new Date(p.created_at).toLocaleString('ko-KR')}</span>
                    </td>
                    <td class="px-8 py-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-partner/5 flex items-center justify-center text-partner">
                                <i class="fas fa-building"></i>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-bold text-gray-900">${p.facility || 'лҜём????…мІҙ'}</span>
                                <span class="text-xs text-gray-400">${p.email}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-gray-700">${p.name || 'лҜёмһ…??}</span>
                            <span class="text-xs text-gray-400">${p.phone || '?°лқҪмІ??ҶмқҢ'}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <button onclick="approveRequest('${p.id}', '${p.facility}')" class="px-6 py-2.5 bg-partner text-white rounded-xl text-xs font-bold shadow-lg shadow-partner/10 hover:bg-black transition-all active:scale-95">
                            мөңмў… ?№мқё
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function approveRequest(userId, facility) {
            if (!confirm(`[${facility}] ?…мІҙ???…м җ???№мқё?ҳмӢңкІ мҠө?Ҳк№Ң?`)) return;

            try {
                const res = await Auth.approvePartner(userId);
                if (res.success) {
                    alert('?ұкіө?ҒмңјлЎ??№мқё?ҳм—Ҳ?өлӢҲ??');
                    loadPendingPartners();
                } else {
                    alert('?№мқё ?ӨнҢЁ: ' + res.message);
                }
            } catch (err) {
                alert('?ӨлҘҳ л°ңмғқ: ' + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
    <script src="js/channel-talk.js"></script>
