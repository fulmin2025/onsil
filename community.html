        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#2C3E50',
                            light: '#34495E',
                            cream: '#F8F6F3',
                            warm: '#D4A574',
                            warmDark: '#B8894E',
                            sage: '#87A08B'
                        }
                    },
                    fontFamily: {

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            background-color: #F8F6F3;
        }

        .category-tab.active {
            background-color: #2C3E50;
            color: white;
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.2);
        }

        .post-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        }

        .comment-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
        }

        .comment-section.active {
            max-height: 1000px;
            transition: max-height 1s ease-in-out;
        }

        .mobile-nav-open {
            transform: translateX(0) !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Modal animation */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }

        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
    <script>
        // State Management
        let currentCategory = 'welcome';
        let currentUser = null;
        let posts = [];
        let uploadedImageBase64 = null;
        let editPostId = null; // Track if we're editing an existing post

        const ADMIN_EMAIL = 'admin@onsil.com';

        const categoryData = {
            welcome: { title: '가입인사', desc: '온실 커뮤니티에 오신 것을 환영합니다! 인사를 나눠보세요.' },
            pet: { title: '아이자랑', desc: '우리 아이의 가장 예쁘고 행복한 순간을 공유해주세요.' },
            daily: { title: '일상공유', desc: '하고 싶은 이야기, 사소한 일상들을 자유롭게 토닥토닥 나눠요.' }
        };

        // Initialize
        window.onload = async () => {
            loadPosts();
            renderPosts();
            
            // Check auth state
            if (window.Auth) {
                try {
                    currentUser = await window.Auth.getCurrentUser();
                    updateAuthUI();
                } catch (e) { console.error(e); }
            }
        };

        function updateAuthUI() {
            const authContainer = document.getElementById('auth-container');
            const writeBtn = document.getElementById('write-button-container');

            if (currentUser) {
                const name = currentUser.email.split('@')[0];
                authContainer.innerHTML = `
                    <div class="flex items-center gap-3 mr-2">
                        <div class="w-8 h-8 rounded-full bg-brand/5 flex items-center justify-center text-xs font-bold text-brand">
                            ${name[0].toUpperCase()}
                        </div>
                        <span class="text-sm font-bold text-brand">${name}님</span>
                    </div>
                `;
                // Members can write
                if (writeBtn) writeBtn.classList.remove('hidden');
            } else {
                authContainer.innerHTML = `
                    <a href="login.html" class="px-4 py-2.5 text-sm font-bold text-brand/60 hover:text-brand transition-all">로그인</a>
                    <a href="signup.html" class="bg-brand text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-brand-light transition-all">회원가입</a>
                `;
                // Hide write button for guests (optional, or show alert on click)
                // if (writeBtn) writeBtn.classList.add('hidden');
            }
        }

        // Category Switching
        function switchCategory(cat) {
            currentCategory = cat;
            
            // Update UI
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${cat}`).classList.add('active');

            document.getElementById('board-title').innerText = categoryData[cat].title;
            document.getElementById('board-desc').innerText = categoryData[cat].desc;

            // Update modal default select
            document.getElementById('post-category').value = cat;

            renderPosts();
        }

        // Data Management (LocalStorage)
        function loadPosts() {
            const savedPosts = localStorage.getItem('onsil_community_posts');
            if (savedPosts) {
                posts = JSON.parse(savedPosts).map(p => ({
                    ...p,
                    authorEmail: p.authorEmail || (p.author + '@test.com'), // Migration for old posts
                    comments: (p.comments || []).map(c => ({
                        ...c,
                        authorEmail: c.authorEmail || (c.author + '@test.com')
                    }))
                }));
            } else {
                // Mock Data
                posts = [
                    { id: 1, cat: 'welcome', title: '처음 가입했습니다!', content: '안녕하세요, 15년 산 강아지 초코와 함께하고 있습니다. 좋은 정보 많이 얻어가고 싶어요.', author: '초코마님', authorEmail: 'choco@test.com', date: '2026-03-30', image: null, comments: [] },
                    { id: 3, cat: 'pet', title: '우리 뭉치 미용했어요', content: '너무 귀엽죠? 복슬복슬했던 털을 깎으니 아기 같네요.', author: '뭉치언니', authorEmail: 'munchi@test.com', date: '2026-03-29', image: 'https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&q=80&w=800', comments: [{id: 101, author: '몽이엄마', authorEmail: 'mong@test.com', content: '어머 너무 인형 같아요!', date: '2026-03-30'}] },
                    { id: 4, cat: 'daily', title: '강아지 껌 추천해주세요', content: '딱딱하지 않으면서 오래 먹는 껌 있을까요?', author: '댕댕러버', authorEmail: 'dang@test.com', date: '2026-03-28', image: null, comments: [] }
                ];
                savePosts();
            }
        }

        function savePosts() {
            localStorage.setItem('onsil_community_posts', JSON.stringify(posts));
        }

        function renderPosts() {
            const container = document.getElementById('board-content');
            const filteredPosts = posts.filter(p => p.cat === currentCategory).sort((a,b) => b.id - a.id);
            
            if (filteredPosts.length === 0) {
                container.innerHTML = `
                    <div class="bg-white py-20 rounded-3xl border border-brand/5 text-center">
                        <i class="fas fa-ghost text-brand/10 text-5xl mb-4"></i>
                        <p class="text-brand/40 font-medium">아직 게시글이 없습니다.<br>첫 번째 이야기를 남겨보세요!</p>
                    </div>
                `;
                return;
            }

            if (currentCategory === 'pet' || currentCategory === 'daily') {
                // Photo-heavy grid
                container.className = "grid sm:grid-cols-2 gap-6";
                container.innerHTML = filteredPosts.map(p => {
                    const isOwner = currentUser && currentUser.email === p.authorEmail;
                    const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;
                    
                    return `
                    <div class="post-card bg-white rounded-3xl shadow-sm border border-brand/5 overflow-hidden flex flex-col relative">
                        <!-- Post Management (Owner/Admin only) -->
                        <div class="absolute top-4 right-4 flex gap-2 z-10">
                            ${isOwner ? `
                                <button onclick="editPost(${p.id})" class="w-8 h-8 rounded-full bg-white/80 backdrop-blur-sm text-brand/40 hover:text-brand transition-colors shadow-sm flex items-center justify-center">
                                    <i class="fas fa-pencil-alt text-[10px]"></i>
                                </button>
                            ` : ''}
                            ${(isOwner || isAdmin) ? `
                                <button onclick="deletePost(${p.id})" class="w-8 h-8 rounded-full bg-white/80 backdrop-blur-sm text-red-400 hover:text-red-600 transition-colors shadow-sm flex items-center justify-center">
                                    <i class="fas fa-trash-alt text-[10px]"></i>
                                </button>
                            ` : ''}
                        </div>
                        ${p.image ? `
                            <div class="h-48 overflow-hidden bg-brand-cream">
                                <img src="${p.image}" class="w-full h-full object-cover">
                            </div>
                        ` : ''}
                        <div class="p-6 flex-1 flex flex-col">
                            <h3 class="font-bold text-lg mb-2 line-clamp-1">${p.title}</h3>
                            <p class="text-sm text-brand/60 leading-relaxed mb-4 line-clamp-2 flex-1">${p.content}</p>
                            <div class="flex items-center justify-between pt-4 border-t border-brand/5 mb-4">
                                <span class="text-xs font-bold text-brand/40">${p.author}</span>
                                <span class="text-[10px] text-brand/20">${p.date}</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <button onclick="toggleComments(${p.id})" class="flex items-center gap-1.5 text-xs font-bold text-brand/60 hover:text-brand transition-colors">
                                    <i class="far fa-comment-dots text-sm"></i>
                                    댓글 ${p.comments.length}
                                </button>
                            </div>
                        </div>
                        <!-- Comment Section for Cards -->
                        <div id="comments-${p.id}" class="comment-section bg-brand-cream/30 border-t border-brand/5">
                            <div class="p-6 space-y-4">
                                <div class="space-y-3" id="comment-list-${p.id}">
                                    ${renderCommentList(p.comments, p.id)}
                                </div>
                                <div class="flex gap-2 mt-4">
                                    <input type="text" id="comment-input-${p.id}" placeholder="댓글을 입력하세요..." class="flex-1 px-4 py-2 rounded-xl border border-brand/10 text-xs focus:ring-2 focus:ring-brand outline-none transition-all">
                                    <button onclick="submitComment(${p.id})" class="bg-brand text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-brand-light transition-all">등록</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');
            } else {
                // Standard list for Welcome
                container.className = "grid gap-4";
                container.innerHTML = filteredPosts.map(p => {
                    const isOwner = currentUser && currentUser.email === p.authorEmail;
                    const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;

                    return `
                    <div class="bg-white rounded-3xl shadow-sm border border-brand/5 overflow-hidden flex flex-col hover:bg-white/50 transition-all cursor-pointer group">
                        <div class="p-6 flex justify-between items-center relative" onclick="toggleComments(${p.id})">
                            <div class="flex-1">
                                <h3 class="font-bold mb-1">${p.title}</h3>
                                <p class="text-sm text-brand/40 line-clamp-1">${p.content}</p>
                            </div>
                            <!-- Small Management in List UI -->
                            <div class="flex items-center gap-4">
                                <div class="text-right">
                                    <p class="text-xs font-bold text-brand/60">${p.author}</p>
                                    <p class="text-[10px] text-brand/20">${p.date}</p>
                                </div>
                                <div class="flex flex-col gap-1 items-center">
                                    <div class="w-8 h-8 rounded-full bg-brand/5 flex flex-col items-center justify-center text-[10px] font-bold text-brand/40">
                                        <i class="far fa-comment"></i>
                                        ${p.comments.length}
                                    </div>
                                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        ${isOwner ? `<i onclick="event.stopPropagation(); editPost(${p.id})" class="fas fa-edit text-brand/30 hover:text-brand text-[10px]"></i>` : ''}
                                        ${(isOwner || isAdmin) ? `<i onclick="event.stopPropagation(); deletePost(${p.id})" class="fas fa-trash-alt text-red-300 hover:text-red-500 text-[10px]"></i>` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Comment Section for List -->
                        <div id="comments-${p.id}" class="comment-section bg-brand-cream/30 border-t border-brand/5">
                            <div class="p-6 space-y-4">
                                <div class="space-y-3" id="comment-list-${p.id}">
                                    ${renderCommentList(p.comments, p.id)}
                                </div>
                                <div class="flex gap-2">
                                    <input type="text" id="comment-input-${p.id}" placeholder="댓글을 입력하세요..." class="flex-1 px-4 py-2 rounded-xl border border-brand/10 text-xs focus:ring-2 focus:ring-brand outline-none transition-all">
                                    <button onclick="submitComment(${p.id})" class="bg-brand text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-brand-light transition-all">등록</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');
            }
        }

        // Modal Logic
        function openWriteModal() {
            if (!currentUser) {
                alert('로그인 후 이용 가능합니다.');
                location.href = 'login.html';
                return;
            }
            document.getElementById('write-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeWriteModal() {
            document.getElementById('write-modal').classList.add('hidden');
            document.body.style.overflow = '';
            // Reset form
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.querySelector('#write-modal h2').innerText = '새 글 작성';
            editPostId = null;
            removeImage();
        }

        function handleImagePreview(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImageBase64 = event.target.result;
                const preview = document.getElementById('image-preview');
                preview.querySelector('img').src = uploadedImageBase64;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            uploadedImageBase64 = null;
            document.getElementById('post-image').value = '';
            document.getElementById('image-preview').classList.add('hidden');
        }

        function submitPost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            const category = document.getElementById('post-category').value;

            if (!title) { alert('제목을 입력해주세요.'); return; }
            if (!content) { alert('내용을 입력해주세요.'); return; }

            if (editPostId) {
                // UPDATE
                const postIndex = posts.findIndex(p => p.id === editPostId);
                if (postIndex !== -1) {
                    posts[postIndex].title = title;
                    posts[postIndex].content = content;
                    posts[postIndex].cat = category;
                    if (uploadedImageBase64) posts[postIndex].image = uploadedImageBase64;
                }
                alert('수정이 완료되었습니다.');
            } else {
                // NEW
                const newPost = {
                    id: Date.now(),
                    cat: category,
                    title: title,
                    content: content,
                    author: currentUser.name || currentUser.email.split('@')[0],
                    authorEmail: currentUser.email,
                    date: new Date().toISOString().split('T')[0],
                    image: uploadedImageBase64,
                    comments: []
                };
                posts.unshift(newPost);
                alert('작성이 완료되었습니다.');
            }

            savePosts();
            closeWriteModal();
            renderPosts();
        }

        // Comment Logic
        function renderCommentList(comments, postId) {
            if (!comments || comments.length === 0) return `<p class="text-[10px] text-brand/30 text-center py-2">가장 먼저 댓글을 남겨보세요!</p>`;
            return comments.map(c => {
                const isCommentOwner = currentUser && currentUser.email === c.authorEmail;
                const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;

                return `
                <div class="flex justify-between items-start gap-3 bg-white/50 p-3 rounded-2xl border border-brand/5 animate-slide-up relative group">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[11px] font-bold text-brand">${c.author}</span>
                            <span class="text-[9px] text-brand/20">${c.date}</span>
                        </div>
                        <p class="text-xs text-brand/70 leading-relaxed">${c.content}</p>
                    </div>
                    ${(isCommentOwner || isAdmin) ? `
                        <button onclick="deleteComment(${postId}, ${c.id})" class="text-red-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                            <i class="fas fa-trash-alt text-[9px]"></i>
                        </button>
                    ` : ''}
                </div>
            `}).join('');
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.classList.toggle('active');
        }

        function submitComment(postId) {
            if (!currentUser) {
                alert('로그인 후 댓글을 작성할 수 있습니다.');
                location.href = 'login.html';
                return;
            }

            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();

            if (!content) {
                alert('댓글 내용을 입력해주세요.');
                return;
            }

            const postIndex = posts.findIndex(p => p.id === postId);
            if (postIndex === -1) return;

            const newComment = {
                id: Date.now(),
                author: currentUser.name || currentUser.email.split('@')[0],
                authorEmail: currentUser.email,
                content: content,
                date: new Date().toISOString().split('T')[0]
            };

            posts[postIndex].comments.push(newComment);
            savePosts();
            
            renderPosts();
            input.value = '';
        }

        // Management Logic
        function deletePost(postId) {
            if (!confirm('정말 이 게시글을 삭제하시겠습니까?')) return;
            posts = posts.filter(p => p.id !== postId);
            savePosts();
            renderPosts();
        }

        function editPost(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            editPostId = postId;
            document.getElementById('post-title').value = post.title;
            document.getElementById('post-content').value = post.content;
            document.getElementById('post-category').value = post.cat;
            document.querySelector('#write-modal h2').innerText = '게시글 수정';
            
            document.getElementById('write-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function deleteComment(postId, commentId) {
            if (!confirm('정말 이 댓글을 삭제하시겠습니까?')) return;
            const postIndex = posts.findIndex(p => p.id === postId);
            if (postIndex !== -1) {
                posts[postIndex].comments = posts[postIndex].comments.filter(c => c.id !== commentId);
                savePosts();
                renderPosts();
            }
        }

        function formatTime(dateStr) {
            return dateStr; // Simple for now
        }

        function toggleMobileNav() {
            const nav = document.getElementById('mobile-nav');
            const panel = document.getElementById('mobile-nav-panel');
            if (nav.classList.contains('hidden')) {
                nav.classList.remove('hidden');
                setTimeout(() => panel.classList.remove('translate-x-full'), 10);
            } else {
                panel.classList.add('translate-x-full');
                setTimeout(() => nav.classList.add('hidden'), 300);
            }
        }
    </script>
</body>

</html>
