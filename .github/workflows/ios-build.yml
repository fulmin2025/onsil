name: iOS Build (Cloud)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # OS 버전을 macos-latest로 변경하여 최신 Xcode(iOS 26 SDK 이상)를 사용하도록 강제합니다.
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install

      - name: Capacitor Sync
        run: npx cap sync ios --inline

      - name: Set Build Number and Version
        run: |
          cd ios/App
          xcrun agvtool new-version -all ${{ github.run_number }}
          xcrun agvtool new-marketing-version 1.0.1

      - name: Import Certificates
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.IOS_P12_CERTIFICATE }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/TheOnsil_AppStore.mobileprovision

      - name: Build iOS App (IPA)
        run: |
          # 1. Archive 생성
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath $PWD/build/App.xcarchive \
                     archive \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     PROVISIONING_PROFILE_SPECIFIER="TheOnsil_AppStore" \
                     DEVELOPMENT_TEAM="59L34WS6RG"
          
          # 2. IPA 파일 Export
          xcodebuild -exportArchive \
                     -archivePath $PWD/build/App.xcarchive \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -exportPath $PWD/build/ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheOnsil-iOS-Build
          path: build/ipa/*.ipa

      - name: Upload to App Store Connect
        run: |
          # 1. API Key 파일 생성
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          
          # 2. 최신 xcrun altool을 사용하여 업로드
          xcrun altool --upload-app \
                       --file build/ipa/App.ipa \
                       --type ios \
                       --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
                       --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
