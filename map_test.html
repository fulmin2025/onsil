<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // Naver Map Domain Fix: Force non-www to match Naver Console registration
        if (window.location.hostname === 'www.theonsil.co.kr') {
            window.location.replace('https://theonsil.co.kr' + window.location.pathname + window.location.search);
        }
    </script>
    <meta name="referrer" content="origin">
    <title>Naver Map Test</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=5tiwbscjvi"></script>
    <style>
        #map { width: 100%; height: 500px; background: #eee; }
    </style>
</head>
<body>
    <h1>Naver Map Connection Test</h1>
    <p>URL: <span id="url"></span></p>
    <div id="map"></div>
    <script>
        document.getElementById('url').innerText = window.location.href;
        try {
            var map = new naver.maps.Map('map', {
                center: new naver.maps.LatLng(37.5665, 126.9780),
                zoom: 10
            });
            console.log("Map Initialized Successfully");
        } catch (e) {
            console.error("Map Initialization Failed", e);
            document.body.innerHTML += '<h2 style="color:red">Error: ' + e.message + '</h2>';
        }
    </script>
</body>
</html>
