<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - The 온실</title>
    <meta name="theme-color" content="#1B2B48">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: "#1B2B48" }, accent: { DEFAULT: "#C5A065" } },
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-2xl font-bold text-center text-[#1B2B48] mb-2">비밀번호 변경</h1>
        <p class="text-sm text-gray-500 text-center mb-8">새로운 비밀번호를 입력해 주세요.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호</label>
                <input type="password" id="new-pw" class="w-full px-4 py-3 rounded border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호 확인</label>
                <input type="password" id="new-pw-confirm" class="w-full px-4 py-3 rounded border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] outline-none">
            </div>
            <button id="btn-reset" onclick="handleReset()" class="w-full bg-[#1B2B48] text-white py-3 rounded font-bold hover:bg-[#2a4269] mt-4">비밀번호 변경하기</button>
        </div>
        <div id="reset-result" class="hidden mt-4 p-4 rounded text-center text-sm"></div>
    </div>

    <!-- Supabase SDK & Auth.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // 임시로 Supabase 파라미터가 없거나 링크가 유효하지 않을 때 경고처리 (Auth.js 대신 독립적으로도 작동 가능하나 Auth 연동 권장)
    </script>
    <script src="js/auth.js"></script>
    <script>
        async function handleReset() {
            const pw1 = document.getElementById('new-pw').value;
            const pw2 = document.getElementById('new-pw-confirm').value;
            const btn = document.getElementById('btn-reset');
            const resultDiv = document.getElementById('reset-result');

            if (!pw1 || pw1.length < 6) {
                alert('비밀번호는 6자리 이상 입력해주세요.');
                return;
            }
            if (pw1 !== pw2) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            btn.disabled = true;
            btn.innerText = '변경 처리 중...';
            resultDiv.classList.add('hidden');

            const res = await window.Auth.updateNewPassword(pw1);

            resultDiv.classList.remove('hidden');
            if (res.success) {
                resultDiv.className = 'mt-4 p-4 rounded text-center text-sm bg-green-50 text-green-700 border border-green-200';
                resultDiv.innerHTML = res.message + '<br><br><a href="login.html" class="font-bold underline">로그인 화면으로 이동</a>';
                btn.style.display = 'none';
            } else {
                resultDiv.className = 'mt-4 p-4 rounded text-center text-sm bg-red-50 text-red-500 border border-red-200';
                resultDiv.innerHTML = res.message;
                btn.disabled = false;
                btn.innerText = '비밀번호 변경하기';
            }
        }
    </script>
</body>
</html>
