<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려동물 삶의 질(QOL) 평가 - The 온실</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1B2B48">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#1B2B48',
                            light: '#2A4269',
                            cream: '#F9F5F0',
                            sage: '#87A08B',
                            warm: '#D4A574',
                            warmDark: '#B88B5A'
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                        serif: ['Nanum Myeongjo', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

        body {
            background-color: #F9F5F0;
        }

        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-bar {
            transition: width 0.4s ease-in-out;
        }

        .option-card {
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .option-card:hover {
            border-color: #D4A574;
            background-color: #FDFBF8;
        }

        .option-card.selected {
            border-color: #D4A574;
            background-color: #FFF9F2;
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.15);
        }
    </style>
</head>

<body class="font-sans antialiased text-brand">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center">
                    <span class="text-white text-xs font-bold">온</span>
                </div>
                <span class="font-bold text-lg tracking-tight">The 온실</span>
            </a>
            <div class="flex items-center gap-4">
                <span id="step-indicator" class="text-sm font-medium text-brand/50">Step 1 / 10</span>
                <a href="self-diagnosis.html" class="text-brand/40 hover:text-brand transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </a>
            </div>
        </div>
        <!-- Progress Bar -->
        <div class="w-full h-1 bg-brand-cream overflow-hidden">
            <div id="progress-line" class="progress-bar h-full bg-brand-warm w-0"></div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12 md:py-20">
        <div id="survey-content">
            <!-- Start Screen -->
            <div id="start-screen" class="step-container active">
                <div class="text-center mb-10">
                    <div
                        class="inline-block px-4 py-1.5 bg-brand-warm/10 text-brand-warm rounded-full text-sm font-bold mb-4">
                        Quality of Life Scale
                    </div>
                    <h1 class="text-3xl md:text-4xl font-extrabold mb-6 font-serif">반려동물의 삶의 질을<br>함께 확인해볼까요?</h1>
                    <p class="text-brand/60 leading-relaxed max-w-lg mx-auto">
                        CodaPet의 수의학적 척도(HHHHHMM)를 기반으로 설계된 설문입니다.
                        아이의 지난 2~3일간의 상태를 떠올리며 가장 가까운 답변을 선택해 주세요.
                    </p>
                </div>

                <div class="bg-white rounded-3xl p-8 shadow-sm border border-brand/5 mb-8">
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="setPetType('dog')" id="type-dog"
                                class="p-4 rounded-xl border-2 border-brand/5 hover:border-brand-warm/30 transition-all flex flex-col items-center gap-2 group">
                                <i class="fas fa-dog text-2xl text-brand/20 group-[.selected]:text-brand-warm"></i>
                                <span class="font-bold text-sm">강아지</span>
                            </button>
                            <button onclick="setPetType('cat')" id="type-cat"
                                class="p-4 rounded-xl border-2 border-brand/5 hover:border-brand-warm/30 transition-all flex flex-col items-center gap-2 group">
                                <i class="fas fa-cat text-2xl text-brand/20 group-[.selected]:text-brand-warm"></i>
                                <span class="font-bold text-sm">고양이</span>
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-brand/40 uppercase tracking-wider mb-2 ml-1">이름</label>
                                <input type="text" id="pet-name" placeholder="아이의 이름"
                                    class="w-full px-4 py-3 rounded-xl border border-brand/10 focus:ring-2 focus:ring-brand-warm outline-none transition-all placeholder:text-brand/20">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-brand/40 uppercase tracking-wider mb-2 ml-1">나이 (살)</label>
                                <input type="number" id="pet-age" placeholder="예) 12"
                                    class="w-full px-4 py-3 rounded-xl border border-brand/10 focus:ring-2 focus:ring-brand-warm outline-none transition-all placeholder:text-brand/20">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-brand/40 uppercase tracking-wider mb-2 ml-1">몸무게 (kg)</label>
                                <input type="number" step="0.1" id="pet-weight" placeholder="예) 4.5"
                                    class="w-full px-4 py-3 rounded-xl border border-brand/10 focus:ring-2 focus:ring-brand-warm outline-none transition-all placeholder:text-brand/20">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-brand/40 uppercase tracking-wider mb-2 ml-1">종류 (품종)</label>
                                <input type="text" id="pet-breed" placeholder="예) 말티즈"
                                    class="w-full px-4 py-3 rounded-xl border border-brand/10 focus:ring-2 focus:ring-brand-warm outline-none transition-all placeholder:text-brand/20">
                            </div>
                        </div>
                    </div>
                </div>

                <button onclick="startSurvey()"
                    class="w-full py-5 bg-brand text-white rounded-2xl font-bold text-lg shadow-xl hover:bg-brand-light transition-all active:scale-[0.98]">
                    설문 시작하기
                </button>
            </div>

            <!-- Survey Steps (Container for JS to inject) -->
            <div id="steps-wrapper"></div>

            <!-- Result Screen -->
            <div id="result-screen" class="step-container">
                <div class="text-center mb-10">
                    <div class="w-20 h-20 bg-brand-warm/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-heart text-brand-warm text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2"><span id="result-pet-name">우리 아이</span>의 삶의 질 점수</h2>
                    <div class="text-6xl font-black text-brand mb-4" id="total-score">00</div>
                    <div class="inline-block px-6 py-2 rounded-full font-bold text-lg mb-6" id="result-badge">평가 결과
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-8 shadow-sm border border-brand/5 space-y-8 mb-8">
                    <div id="result-description" class="text-brand/70 leading-relaxed italic text-center text-lg">
                        결과 분석 중...
                    </div>

                    <div class="grid gap-4">
                        <div class="p-4 bg-brand-cream rounded-2xl flex items-start gap-4">
                            <i class="fas fa-info-circle text-brand-warm mt-1"></i>
                            <div>
                                <h4 class="font-bold text-sm mb-1">참고 사항</h4>
                                <p class="text-xs text-brand/50 leading-relaxed">이 결과는 수의학적 보조 지표일 뿐, 절대적인 진단이 아닙니다. 정확한
                                    상태는 수의사와의 상담이 권장됩니다.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center">
                    <button onclick="location.reload()"
                        class="w-full max-w-xs py-5 bg-brand text-white rounded-2xl font-bold text-lg shadow-xl hover:bg-brand-light transition-all active:scale-[0.98]">
                        다시 테스트하기
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t bg-white">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-sm text-brand/30">&copy; 2026 The 온실. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/qol-survey.js"></script>
</body>

</html>
