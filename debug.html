<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시스템 진단 도구</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js?v=debug"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .ok { background: #e6fffa; color: #2c7a7b; border: 1px solid #b2f5ea; }
        .error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        pre { background: #f7fafc; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>온실 시스템 진단 도구</h1>
    <div id="results">진단 중...</div>

    <script>
        async function runAudit() {
            const el = document.getElementById('results');
            let html = '';

            // 1. SDK Check
            if (typeof supabase !== 'undefined') {
                html += '<div class="status ok">✓ Supabase SDK 로드 완료</div>';
            } else {
                html += '<div class="status error">✗ Supabase SDK 로드 실패 (CDN 연결 확인 필요)</div>';
            }

            // 2. Auth Check
            if (typeof Auth !== 'undefined') {
                html += '<div class="status ok">✓ Auth.js 로드 완료</div>';
                try {
                    const user = await Auth.getCurrentUser();
                    if (user) {
                        html += `<div class="status ok">✓ 로그인 상태: ${user.email} (Role: ${user.role})</div>`;
                    } else {
                        html += '<div class="status error">✗ 로그인 세션 없음 (다시 로그인 필요)</div>';
                    }
                } catch (e) {
                    html += `<div class="status error">✗ 인증 확인 중 오류: ${e.message}</div>`;
                }
            } else {
                html += '<div class="status error">✗ Auth.js 로드 실패</div>';
            }

            // 3. DB Check
            try {
                const homes = await Auth.getAllFuneralHomes();
                if (homes && homes.length > 0) {
                    html += `<div class="status ok">✓ DB 연결 성공: ${homes.length}개의 데이터 조회됨</div>`;
                } else {
                    html += '<div class="status error">✗ DB 데이터 없음 또는 조회 실패 (RLS 정책 확인 필요)</div>';
                }
            } catch (e) {
                html += `<div class="status error">✗ DB 조회 오류: ${e.message}</div>`;
            }

            // 4. Cache Clear Button
            html += '<hr><button onclick="clearAll()">캐시 및 서비스 워커 강제 초기화</button>';

            el.innerHTML = html;
        }

        async function clearAll() {
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let reg of regs) await reg.unregister();
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                for (let key of keys) await caches.delete(key);
            }
            alert('초기화 완료. 페이지를 새로고침(F5) 해주세요.');
            location.reload();
        }

        runAudit();
    </script>
</body>
</html>
