            const listContainer = document.getElementById('home-list');
            allHomes = await Auth.getAllFuneralHomes();
            renderTable(allHomes);
        }

        function renderTable(items) {
            const listContainer = document.getElementById('home-list');
            if (items.length === 0) {
                listContainer.innerHTML = '<tr><td colspan="3" class="px-8 py-20 text-center text-gray-400 font-medium italic">?�록???�이?��? ?�습?�다.</td></tr>';

                    <td class="px-8 py-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl ${h.is_alliance ? 'bg-accent/10 text-accent' : 'bg-gray-100 text-gray-400'} flex items-center justify-center">

                                    ${h.is_24h ? '<span class="px-1.5 py-0.5 bg-blue-50 text-blue-500 text-[9px] font-black rounded uppercase">24H</span>' : ''}

            const id = document.getElementById('form-id').value;
            let prices = [];
            try {
                prices = JSON.parse(document.getElementById('form-prices').value || '[]');
            } catch (e) {
                alert('가�??�보 JSON ?�식???�바르�? ?�습?�다.');

                name: document.getElementById('form-name').value,

                address: document.getElementById('form-address').value,
                phone: document.getElementById('form-phone').value,
                image_url: document.getElementById('form-image-url').value,
                description: document.getElementById('form-description').value,
                latitude: document.getElementById('form-lat').value,
                longitude: document.getElementById('form-lng').value,

                is_alliance: document.getElementById('form-is-alliance').checked,
                is_24h: document.getElementById('form-is-24h').checked,
                prices: prices

            let res;
            if (id) {
                res = await Auth.updateFuneralHome(id, formData);
            } else {
                res = await Auth.createFuneralHome(formData);
            }
