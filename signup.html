<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 온실(Onsil)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1B2B48">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: "#1B2B48" },
                        secondary: { DEFAULT: "#FAFAFA" },
                        accent: { DEFAULT: "#C5A065" },
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                        serif: ['Nanum Myeongjo', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
    </style>
</head>

<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">


    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-8">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold text-[#1B2B48] block mb-2">온실(Onsil)</a>
            <p class="text-gray-500 text-sm">회원가입하고 온실의 서비스를 이용해보세요.</p>
        </div>

        <form id="signup-form" class="space-y-6" onsubmit="return false;">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                <input type="text" id="name" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="홍길동">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="example@email.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="••••••••">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">성별</label>
                    <div class="flex gap-2">
                        <button type="button" onclick="setGender('male')" id="gender-male"
                            class="flex-1 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-all font-medium gender-btn">
                            남
                        </button>
                        <button type="button" onclick="setGender('female')" id="gender-female"
                            class="flex-1 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-all font-medium gender-btn">
                            여
                        </button>
                    </div>
                    <input type="hidden" id="gender" required>
                </div>
                <div>
                    <label for="birth-year" class="block text-sm font-medium text-gray-700 mb-1">출생년도</label>
                    <input type="number" id="birth-year" required min="1900" max="2026"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                        placeholder="예: 1990">
                </div>
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">전화번호</label>
                <input type="tel" id="phone" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all text-black"
                    placeholder="010-0000-0000">
            </div>

            <button type="button" id="signup-btn" onclick="handleSignup()"
                class="w-full bg-[#1B2B48] text-white py-3 rounded-lg font-bold hover:bg-[#2a4269] transition-colors shadow-md">
                가입하기
            </button>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-400 font-medium whitespace-nowrap">또는 간편 회원가입</span>
                </div>
            </div>

            <button type="button" onclick="handleKakaoLogin()"
                class="w-full bg-[#FEE500] text-[#191919] py-3 rounded-lg font-bold hover:bg-[#FADA0A] transition-colors shadow-sm flex items-center justify-center gap-2">
                <img src="https://developers.kakao.com/assets/img/lib/logos/kakaolink/kakaolink_help_icon.png" alt="Kakao" class="w-5 h-5">
                카카오로 시작하기
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            이미 계정이 있으신가요?
            <a href="login.html" class="text-[#C5A065] font-bold hover:underline">로그인</a>
        </div>
    </div>

    <!-- Supabase CDN (Stable UMD Build) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
        onload="console.log('Supabase Loaded via CDN');" onerror="alert('Supabase CDN 로드 실패. 인터넷 연결을 확인하세요.');">
        </script>

    <script>
        // Check if library loaded
        window.addEventListener('load', function () {
            if (!(window.supabase && window.supabase.createClient)) {
                var typeInfo = (window.supabase === null) ? "null" : typeof window.supabase;
                alert("오류: Supabase 로드 실패.\nwindow.supabase 상태: " + typeInfo);
            }
        });

        const SUPABASE_URL = 'https://fkmcanwlcigofjhbfkzs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9OyB7n3foIalMmDxq1-_PA_s3xYfcJS';
        let authClient = null; // Renamed to avoid conflict

        function setGender(gender) {
            document.getElementById('gender').value = gender;
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('bg-[#1B2B48]', 'text-white', 'border-[#1B2B48]');
                btn.classList.add('border-gray-300', 'text-gray-600');
            });
            const selected = document.getElementById('gender-' + gender);
            selected.classList.remove('border-gray-300', 'text-gray-600');
            selected.classList.add('bg-[#1B2B48]', 'text-white', 'border-[#1B2B48]');
        }

        function getSupabase() {
            if (authClient) return authClient;

            try {
                if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                    authClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log('Supabase Client Initialized');
                    return authClient;
                } else {
                    console.error('window.supabase is not available');
                    alert('시스템 오류: Supabase 인증 모듈을 불러올 수 없습니다.');
                    return null;
                }
            } catch (e) {
                console.error('Supabase Initialization Error:', e);
                alert('초기화 오류: ' + e.message);
                return null;
            }
        }

        async function handleSignup() {
            // Check button click
            if (typeof window.alert === 'function') {
                // Remove annoying alert after confirmation
                // alert("가입 버튼이 클릭되었습니다."); 
            }

            const submitBtn = document.getElementById('signup-btn');
            const originalBtnText = submitBtn.innerText;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = '처리 중...';

                // Get form values and trim whitespace
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const name = document.getElementById('name').value.trim();
                const gender = document.getElementById('gender').value;
                const birthYear = document.getElementById('birth-year').value;
                const phone = document.getElementById('phone').value.trim();

                console.log("Attempting signup with:", { email, name, gender, birthYear, phone });

                if (!email || !password || !name || !gender || !birthYear || !phone) {
                    throw new Error('모든 필드를 입력해 주세요.');
                }

                const client = getSupabase();
                if (!client) throw new Error('인증 서비스 연결 실패');

                // Sign up using Auth.js (which we updated)
                const { data, error } = await client.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            name: name,
                            gender: gender,
                            birth_year: birthYear,
                            phone: phone,
                            role: 'director' // Default role
                        }
                    }
                });

                if (error) throw error;

                if (data?.user) {
                    alert('회원가입 완료! 로그인 페이지로 이동합니다.');
                    window.location.href = 'login.html';
                } else {
                    throw new Error('가입 요청은 전송되었으나 응답이 올바르지 않습니다.');
                }

            } catch (error) {
                console.error('Signup Error:', error);
                let msg = error.message || error.error_description || JSON.stringify(error);

                // Translate common errors
                if (msg.includes('rate limit') || msg.includes('Too many requests')) {
                    msg = "보안 경고: 너무 많은 가입 시도로 인해 서버가 이 IP를 일시적으로 차단했습니다.\n(1시간 뒤에 다시 시도하시거나, 다른 인터넷 환경에서 시도해주세요.)";
                } else if (msg.includes('already registered')) {
                    msg = "이미 가입된 이메일입니다. 로그인해주세요.";
                }

                alert('오류 발생: ' + msg);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        }

        async function handleKakaoLogin() {
            try {
                const client = getSupabase();
                if (!client) throw new Error('인증 서비스 연결 실패');

                const { data, error } = await client.auth.signInWithOAuth({
                    provider: 'kakao',
                    options: {
                        redirectTo: window.location.origin + '/index.html'
                    }
                });

                if (error) throw error;
            } catch (error) {
                console.error('Kakao Login Error:', error);
                alert('카카오 가입 시도 중 오류가 발생했습니다: ' + error.message);
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        } else if (window.location.protocol === 'file:') {
            console.warn('Onsil: PWA features (Service Worker) are disabled on file:// protocol.');
        }
    </script>
</body>

</html>
