<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 온실(Onsil)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2C3E50">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#2C3E50',
                            light: '#34495E',
                            dark: '#1A252F',
                            cream: '#F8F6F3',
                            warm: '#D4A574',
                            warmDark: '#B8894E',
                            sage: '#87A08B',
                            mist: '#E8ECE9'
                        },
                        partner: "#1B2B48",
                        primary: "#1B2B48",
                        accent: "#D4A574",
                        onsil: "#8D7B68"
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
    </style>
</head>

<body class="bg-brand-cream font-sans flex items-center justify-center min-h-screen p-4 sm:p-6 antialiased text-brand">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden p-8 border border-brand/5">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex flex-col items-center gap-3 group">
                <div class="w-16 h-16 rounded-2xl bg-brand flex items-center justify-center transition-transform group-hover:scale-105 shadow-lg shadow-brand/20">
                    <span class="text-white text-xl font-bold">온실</span>
                </div>
                <span class="text-3xl font-bold text-brand tracking-tight">온실(Onsil)</span>
            </a>
            <p class="text-brand/50 text-sm mt-4">반려동물과의 따뜻한 이별, 온실이 함께합니다.</p>
        </div>

        <form id="login-form" class="space-y-5" onsubmit="return false;">
            <div>
                <label for="email" class="block text-sm font-bold text-brand/70 mb-2">이메일</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3.5 rounded-xl bg-brand-cream border-none focus:ring-2 focus:ring-brand/10 outline-none transition-all placeholder:text-brand/30"
                    placeholder="example@email.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-brand/70 mb-2">비밀번호</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3.5 rounded-xl bg-brand-cream border-none focus:ring-2 focus:ring-brand/10 outline-none transition-all placeholder:text-brand/30"
                    placeholder="••••••••">
            </div>

            <button type="button" id="login-btn" onclick="handleLogin()"
                class="w-full bg-brand text-white py-4 rounded-2xl font-bold hover:bg-brand-light transition-all shadow-lg active:scale-[0.98] mt-2">
                로그인
            </button>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-brand/5"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-3 bg-white text-brand/30 font-medium">또는 간편 로그인</span>
                </div>
            </div>

            <button type="button" onclick="handleKakaoLogin()"
                class="w-full bg-[#FEE500] text-[#191919] py-3.5 rounded-xl font-bold hover:bg-[#FADA0A] transition-all shadow-sm flex items-center justify-center gap-2 active:scale-[0.98]">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3C6.477 3 2 6.48 2 10.79c0 2.75 1.81 5.15 4.54 6.55l-1.15 4.23c-.05.18.05.37.21.43.05.02.1.03.15.03.12 0 .23-.07.28-.19l4.59-3.04c1.1.13 2.25.2 3.42.2 5.523 0 10-3.48 10-7.79S17.523 3 12 3z"/>
                </svg>
                카카오로 시작하기
            </button>
            <button type="button" onclick="handleAppleLogin()"
                class="w-full bg-black text-white py-3.5 rounded-xl font-bold hover:bg-gray-800 transition-all shadow-sm flex items-center justify-center gap-2 active:scale-[0.98]">
                <i class="fab fa-apple text-xl"></i>
                Apple로 시작하기
            </button>
        </form>

        <div class="mt-8 flex flex-col space-y-4">
            <div class="flex justify-center items-center gap-4 text-xs font-medium text-brand/40">
                <a href="find-account.html?mode=id" class="hover:text-brand transition-colors">아이디 찾기</a>
                <div class="w-px h-3 bg-brand/10"></div>
                <a href="find-account.html?mode=pw" class="hover:text-brand transition-colors">비밀번호 찾기</a>
            </div>
            <div class="text-center text-sm text-brand/60">
                아직 계정이 없으신가요?
                <a href="signup.html" class="text-brand-warm font-bold hover:underline ml-1">회원가입</a>
            </div>
        </div>
    </div>

    <!-- Supabase CDN (Stable UMD Build) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        // Global Error Handler
        window.onerror = function (msg, url, line, col, error) {
            console.error("JS Error:", msg);
            return false;
        };

        const SUPABASE_URL = 'https://fkmcanwlcigofjhbfkzs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9OyB7n3foIalMmDxq1-_PA_s3xYfcJS';
        let authClient = null;

        // Initialization Check
        window.addEventListener('load', function () {
            if (window.supabase && window.supabase.createClient) {
                console.log('Login Page: Supabase Loaded Successfully');
            } else {
                alert("심각한 오류: Supabase 라이브러리를 불러올 수 없습니다.");
            }
        });

        function getSupabase() {
            if (authClient) return authClient;
            try {
                if (window.supabase && window.supabase.createClient) {
                    authClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    return authClient;
                }
                return null;
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        async function handleLogin() {
            const submitBtn = document.getElementById('login-btn');
            const originalBtnText = submitBtn.innerText;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = '로그인 중...';

                let email = document.getElementById('email').value.trim();
                if (email.toLowerCase() === 'fulmin') {
                    email = atob('ZnVsbWluQG5hdGUuY29t');
                    document.getElementById('email').value = email;
                }
                const password = document.getElementById('password').value.trim();

                if (!email || !password) {
                    throw new Error('이메일과 비밀번호를 모두 입력해주세요.');
                }

                const sb = getSupabase();
                if (!sb) throw new Error('인증 서비스를 연결할 수 없습니다.');

                const { data, error } = await sb.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data?.session) {
                    window.location.href = 'index.html';
                } else {
                    throw new Error('로그인 정보를 확인할 수 없습니다.');
                }

            } catch (error) {
                console.error('Login Error:', error);
                let msg = error.message || "로그인에 실패했습니다.";

                if (msg.includes('Invalid login credentials')) {
                    msg = "이메일 또는 비밀번호가 일치하지 않습니다.";
                } else if (msg.includes('Email not confirmed')) {
                    msg = "이메일 인증이 완료되지 않았습니다.";
                }

                alert(msg);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        }

        async function handleAppleLogin() {
            try {
                const sb = getSupabase();
                if (!sb) throw new Error('인증 서비스 연결 실패');

                const isCapacitor = !!window.Capacitor;

                // Capacitor 환경이며 Native Apple Sign-In 플러그인이 로드되어 있는 경우
                if (isCapacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SignInWithApple) {
                    console.log('App: Launching native Sign in with Apple...');
                    const SignInWithApple = window.Capacitor.Plugins.SignInWithApple;
                    
                    // iOS 네이티브 환경에서는 clientId와 redirectUri가 불필요하며, 설정 시 오동작할 수 있으므로 scopes만 지정합니다.
                    const result = await SignInWithApple.authorize({
                        scopes: 'email name',
                    });

                    if (result && result.response && result.response.identityToken) {
                        const { data, error } = await sb.auth.signInWithIdToken({
                            provider: 'apple',
                            token: result.response.identityToken,
                        });

                        if (error) throw error;

                        if (data?.session) {
                            window.location.href = 'index.html';
                            return;
                        }
                    } else {
                        throw new Error('Apple 로그인 토큰을 가져올 수 없습니다. 응답 구조: ' + JSON.stringify(result));
                    }
                } else {
                    // 웹 브라우저 환경 또는 플러그인이 없을 때의 Fallback
                    console.log('Web: Launching OAuth Apple Login...');
                    const redirectTo = isCapacitor ? 'onsilapp://index.html' : window.location.origin + '/index.html';

                    const { data, error } = await sb.auth.signInWithOAuth({
                        provider: 'apple',
                        options: {
                            redirectTo: redirectTo,
                            skipBrowserRedirect: isCapacitor
                        }
                    });

                    if (error) throw error;

                    if (isCapacitor && data?.url) {
                        const Browser = window.Capacitor.Plugins.Browser;
                        if (Browser) {
                            await Browser.open({ url: data.url });
                        } else {
                            window.location.href = data.url;
                        }
                    }
                }
            } catch (error) {
                console.error('Apple Login Error:', error);
                alert('Apple 로그인 중 오류가 발생했습니다: ' + error.message + '\n상세: ' + JSON.stringify(error));
            }
        }

        async function handleKakaoLogin() {
            try {
                const sb = getSupabase();
                if (!sb) throw new Error('인증 서비스를 연결할 수 없습니다.');

                const isCapacitor = !!window.Capacitor;
                const redirectTo = isCapacitor ? 'onsilapp://index.html' : window.location.origin + '/index.html';

                const { data, error } = await sb.auth.signInWithOAuth({
                    provider: 'kakao',
                    options: {
                        redirectTo: redirectTo,
                        skipBrowserRedirect: isCapacitor
                    }
                });

                if (error) throw error;

                if (isCapacitor && data?.url) {
                    const Browser = window.Capacitor.Plugins.Browser;
                    if (Browser) {
                        await Browser.open({ url: data.url });
                    } else {
                        window.location.href = data.url;
                    }
                }
            } catch (error) {
                console.error('Kakao Login Error:', error);
                alert('카카오 로그인 중 오류가 발생했습니다: ' + error.message);
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
    <script src="js/channel-talk.js"></script>
</body>

</html>
