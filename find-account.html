<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 찾기 - The 온실</title>
    <meta name="theme-color" content="#1B2B48">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: "#1B2B48" },
                        secondary: { DEFAULT: "#FAFAFA" },
                        accent: { DEFAULT: "#C5A065" },
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        .tab-active { border-bottom-width: 2px; border-color: #1B2B48; color: #1B2B48; font-weight: 700; }
        .tab-inactive { color: #6B7280; font-weight: 500; border-bottom-width: 2px; border-color: transparent; border-bottom-color: #E5E7EB; }
    </style>
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-8">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block">
                <img src="./images/onsil_logo_tr.png" class="w-16 h-16 mx-auto object-contain" alt="온실 로고">
            </a>
            <h1 class="text-2xl font-bold text-[#1B2B48] mt-4">계정 찾기</h1>
        </div>

        <!-- 탭 네비게이션 -->
        <div class="flex mb-6">
            <button id="btn-tab-id" onclick="switchTab('id')" class="flex-1 pb-3 text-center tab-active transition-colors">아이디 찾기</button>
            <button id="btn-tab-pw" onclick="switchTab('pw')" class="flex-1 pb-3 text-center tab-inactive transition-colors hover:text-gray-900">비밀번호 찾기</button>
        </div>

        <!-- 아이디 찾기 폼 -->
        <div id="form-id" class="space-y-5 block">
            <p class="text-sm text-gray-500 mb-4 tracking-tight">가입할 때 등록한 이름과 휴대폰 번호를 입력해 주세요.</p>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                <input type="text" id="find-name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all" placeholder="이름 입력">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">휴대폰 번호</label>
                <input type="tel" id="find-phone" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all" placeholder="숫자만 입력 (예: 01012345678)">
            </div>
            <button id="btn-find-id" onclick="handleFindId()" class="w-full bg-[#1B2B48] text-white py-3 rounded-lg font-bold hover:bg-[#2a4269] transition-colors shadow-md mt-2">
                아이디 확인
            </button>
            <div id="result-id" class="hidden mt-4 p-4 bg-gray-50 rounded-lg text-center text-sm border border-gray-200">
                <!-- 결과 텍스트 삽입 구간 -->
            </div>
        </div>

        <!-- 비밀번호 찾기 폼 -->
        <div id="form-pw" class="space-y-5 hidden">
            <p class="text-sm text-gray-500 mb-4 tracking-tight">가입된 이메일 주소를 입력하시면 비밀번호 재설정 링크를 보내드립니다.</p>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이메일 주소</label>
                <input type="email" id="find-email" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1B2B48] focus:border-transparent outline-none transition-all" placeholder="example@email.com">
            </div>
            <button id="btn-find-pw" onclick="handleFindPw()" class="w-full bg-[#1B2B48] text-white py-3 rounded-lg font-bold hover:bg-[#2a4269] transition-colors shadow-md mt-2">
                재설정 메일 보내기
            </button>
            <div id="result-pw" class="hidden mt-4 p-4 bg-green-50 text-green-700 rounded-lg text-center text-sm border border-green-200">
                <!-- 결과 텍스트 삽입 구간 -->
            </div>
        </div>

        <div class="mt-8 text-center text-sm">
            <a href="login.html" class="text-gray-500 hover:text-[#C5A065] font-bold hover:underline inline-flex items-center gap-1">
                <i class="fas fa-arrow-left text-xs"></i> 로그인 화면으로 돌아가기
            </a>
        </div>
    </div>

    <!-- Supabase SDK & Auth.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // 탭 스위칭 로직
        function switchTab(tab) {
            const btnId = document.getElementById('btn-tab-id');
            const btnPw = document.getElementById('btn-tab-pw');
            const formId = document.getElementById('form-id');
            const formPw = document.getElementById('form-pw');
            const resultId = document.getElementById('result-id');
            const resultPw = document.getElementById('result-pw');

            if (tab === 'id') {
                btnId.className = 'flex-1 pb-3 text-center tab-active transition-colors';
                btnPw.className = 'flex-1 pb-3 text-center tab-inactive hover:text-gray-900 transition-colors cursor-pointer';
                formId.classList.remove('hidden');
                formPw.classList.add('hidden');
            } else {
                btnPw.className = 'flex-1 pb-3 text-center tab-active transition-colors';
                btnId.className = 'flex-1 pb-3 text-center tab-inactive hover:text-gray-900 transition-colors cursor-pointer';
                formPw.classList.remove('hidden');
                formId.classList.add('hidden');
            }
            
            resultId.classList.add('hidden');
            resultPw.classList.add('hidden');
            resultId.innerHTML = '';
            resultPw.innerHTML = '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'pw') switchTab('pw');
        });

        async function handleFindId() {
            const name = document.getElementById('find-name').value.trim();
            const phone = document.getElementById('find-phone').value.trim().replace(/-/g, '');
            const resultDiv = document.getElementById('result-id');
            const btn = document.getElementById('btn-find-id');

            if (!name || !phone) { alert('이름과 휴대폰 번호를 모두 입력해주세요.'); return; }

            btn.disabled = true; btn.innerText = '확인 중...'; resultDiv.classList.add('hidden');

            const res = await window.Auth.findEmailByNameAndPhone(name, phone);
            
            resultDiv.classList.remove('hidden');
            if (res.success) {
                resultDiv.innerHTML = `<span class="text-gray-600 block mb-1">고객님의 아이디(이메일)는 다음과 같습니다.</span><span class="text-lg font-bold text-[#1B2B48] tracking-wide">${res.email}</span>`;
            } else {
                resultDiv.innerHTML = `<span class="text-red-500 font-medium">${res.message}</span>`;
            }
            
            btn.disabled = false; btn.innerText = '아이디 확인';
        }

        async function handleFindPw() {
            const email = document.getElementById('find-email').value.trim();
            const resultDiv = document.getElementById('result-pw');
            const btn = document.getElementById('btn-find-pw');

            if (!email) { alert('가입하신 이메일 주소를 입력해주세요.'); return; }

            btn.disabled = true; btn.innerText = '이메일 전송 중...'; resultDiv.classList.add('hidden');

            const res = await window.Auth.sendPasswordResetEmail(email);
            
            resultDiv.classList.remove('hidden');
            if (res.success) {
                resultDiv.className = 'mt-4 p-4 bg-green-50 text-green-700 rounded-lg text-center text-sm border border-green-200';
                resultDiv.innerHTML = `<strong>전송 성공!</strong><br>입력하신 메일함으로 비밀번호 재설정 링크를 보내드렸습니다.`;
            } else {
                resultDiv.className = 'mt-4 p-4 bg-red-50 text-red-500 rounded-lg text-center text-sm border border-red-200';
                resultDiv.innerHTML = `<span class="font-medium">${res.message}</span>`;
            }

            btn.disabled = false; btn.innerText = '재설정 메일 보내기';
        }
    </script>
</body>
</html>
