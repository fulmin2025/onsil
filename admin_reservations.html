<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 통합 관리 - The 온실 Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#2C3E50',
                            light: '#34495E',
                            dark: '#1A252F',
                            cream: '#F8F6F3',
                            warm: '#D4A574',
                            warmDark: '#B8894E',
                            sage: '#87A08B',
                            mist: '#E8ECE9'
                        },
                        partner: "#1B2B48",
                        primary: "#1B2B48",
                        accent: "#D4A574",
                        onsil: "#8D7B68"
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* 헤더 고정으로 인한 본문 가림 방지 */
        body {
            padding-top: 64px; /* h-16 */
        }
        @media (min-width: 640px) {
            body {
                padding-top: 72px; /* h-18 */
            }
        }
        main {
            padding-top: 2rem !important;
        }
    </style>

</head>

<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">
    <!-- Header -->
    <header id="main-header" class="fixed top-0 z-50 w-full bg-white border-b border-brand/5 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-18 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center">
                        <span class="text-white text-xs font-bold">온</span>
                    </div>
                    <span class="font-bold text-lg text-brand tracking-tight">온실(Onsil) <span id="admin-badge" class="hidden text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded ml-1">ADMIN</span></span>
                </a>
                
                <nav class="hidden md:flex items-center gap-1 border-l border-gray-100 pl-6 ml-2">
                    <a href="admin_reservations.html" id="nav-res" class="px-4 py-2 text-sm font-bold text-brand bg-brand/5 rounded-lg transition-all">예약 관리</a>
                    <a href="admin_partners.html" class="px-4 py-2 text-sm font-medium text-brand/70 hover:text-brand hover:bg-brand/5 rounded-lg transition-all">파트너 관리</a>
                    <a href="admin_funeral_homes.html" class="px-4 py-2 text-sm font-medium text-brand/70 hover:text-brand hover:bg-brand/5 rounded-lg transition-all">장례식장 관리</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div id="auth-container"></div>
                <button onclick="Auth.logout()" class="hidden sm:block px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4  pb-24">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 id="dashboard-title" class="text-2xl font-bold text-gray-900">예약 통합 관리</h1>
                <p class="text-gray-500 mt-1">온실의 모든 실시간 예약 내역을 실시간으로 확인하고 관리할 수 있습니다.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openAddModal()"
                    class="inline-flex items-center gap-2 bg-onsil text-white px-5 py-2.5 rounded-xl font-bold hover:bg-[#7A6A59] transition-all shadow-lg active:scale-95">
                    <i class="fas fa-plus"></i> 신규 예약 등록
                </button>
                <button onclick="loadReservations()"
                    class="inline-flex items-center gap-2 bg-white border border-gray-200 px-4 py-2.5 rounded-xl hover:bg-gray-50 transition-colors shadow-sm text-gray-600">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Reservation List -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50/50 border-b border-gray-100">
                        <tr>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">접수일시</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">서비스/업체</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">예약 일정</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">금액</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">반려동물 정보</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">연락처</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider text-center">작업</th>
                        </tr>
                    </thead>
                    <tbody id="reservation-list" class="divide-y divide-gray-50">
                        <tr>
                            <td colspan="7" class="px-6 py-20 text-center">
                                <i class="fas fa-spinner fa-spin text-onsil text-2xl mb-3"></i>
                                <p class="text-gray-400 text-sm">데이터를 안전하게 불러오는 중입니다...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Reservation Modal -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeAddModal()"></div>
        <div class="bg-white w-full max-w-xl rounded-3xl p-8 relative z-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">신규 예약 수동 등록</h2>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="add-res-form" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">장례식장 선택</label>
                        <select id="res-facility" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20 focus:border-onsil transition-all">
                            <option value="">시설을 선택해주세요</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">예약 날짜</label>
                        <input type="date" id="res-date" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">예약 시간</label>
                        <select id="res-time" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20">
                            <option value="09:00">09:00</option><option value="09:30">09:30</option>
                            <option value="10:00">10:00</option><option value="10:30">10:30</option>
                            <option value="11:00">11:00</option><option value="11:30">11:30</option>
                            <option value="12:00">12:00</option><option value="13:00">13:00</option>
                            <option value="14:00">14:00</option><option value="15:00">15:00</option>
                            <option value="16:00">16:00</option><option value="17:00">17:00</option>
                            <option value="18:00">18:00</option><option value="19:00">19:00</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">고객 성함</label>
                        <input type="text" id="res-user-name" placeholder="예약자 성함" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">아이 이름</label>
                        <input type="text" id="res-pet-name" placeholder="이름" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">종류 (강아지/고양이 등)</label>
                        <input type="text" id="res-pet-type" placeholder="종류" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">보호자 연락처</label>
                    <input type="tel" id="res-phone" placeholder="010-0000-0000" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-onsil/20">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeAddModal()" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold hover:bg-gray-200 transition-all">취소</button>
                    <button type="submit" class="flex-[2] py-4 bg-onsil text-white rounded-2xl font-bold hover:bg-[#7A6A59] transition-all shadow-lg active:scale-[0.98]">예약 등록</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js?v=2"></script>
    
    <script>
        async function updateAdminUI() {
            try {
                const user = await Auth.getCurrentUser();
                if (user) {
                    const badge = document.getElementById('admin-badge');
                    if (badge) {
                        if (user.role === 'admin' || user.email === 'fulmin@nate.com') {
                            badge.classList.remove('hidden');
                            badge.textContent = 'ADMIN';
                            badge.className = 'text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded ml-1';
                        } else if (user.role === 'partner') {
                            badge.classList.remove('hidden');
                            badge.textContent = 'PARTNER';
                            badge.className = 'text-[10px] bg-blue-500 text-white px-1.5 py-0.5 rounded ml-1';
                        }
                    }
                }
            } catch (err) {}
        }
        document.addEventListener('DOMContentLoaded', updateAdminUI);
    </script>
    <script src="js/channel-talk.js"></script>

    <script>
        async function checkAdminAccess() {
            try {
                const user = await Auth.getCurrentUser();
                if (!user) {
                    location.href = 'index.html';
                    return;
                }
                
                const isAdmin = ["fulmin@nate.com","theonsil@gmail.com","admin@theonsil.co.kr","theonsilofficial@gmail.com","admin@onsil.com"].includes(user.email?.toLowerCase()) || user.role === 'admin';
                const isPartner = user.role === 'partner';
                
                
                if (!isAdmin && !isPartner) {
                    alert('접근 권한이 없습니다.');
                    location.href = 'index.html';
                    return;
                }
                
                
                // Load Page Data
                if (typeof loadReservations === 'function') loadReservations();
                if (typeof loadPendingPartners === 'function') loadPendingPartners();
                if (typeof loadFuneralHomes === 'function') loadFuneralHomes();
                
                // Update UI Badges
                const badge = document.getElementById('admin-badge');
                if (badge) {
                    if (isAdmin) {
                        badge.classList.remove('hidden');
                        badge.textContent = 'ADMIN';
                        badge.className = 'text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded ml-1';
                    } else if (isPartner) {
                        badge.classList.remove('hidden');
                        badge.textContent = 'PARTNER';
                        badge.className = 'text-[10px] bg-blue-50 text-blue-500 px-1.5 py-0.5 rounded ml-1';
                    }
                }
                
                // Hide restricted menu items for partners
                if (isPartner) {
                    const partnersMenu = document.querySelector('a[href="admin_partners.html"]');
                    const funeralMenu = document.querySelector('a[href="admin_funeral_homes.html"]');
                    if (partnersMenu) partnersMenu.classList.add('hidden');
                    if (funeralMenu) funeralMenu.classList.add('hidden');
                }
            } catch (err) {
                console.error("Auth Check Error:", err);
                location.href = 'index.html';
            }
        }
        document.addEventListener('DOMContentLoaded', checkAdminAccess);
    </script>
    
</body>

</html>
