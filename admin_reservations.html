<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 통합 관리 - The 온실 Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#2C3E50', warm: '#D4A574', warmDark: '#B8894E', sage: '#87A08B' },
                        partner: "#1B2B48", primary: "#1B2B48", accent: "#D4A574", onsil: "#8D7B68"
                    },
                    fontFamily: { sans: ['Pretendard', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>body { padding-top: 72px; } main { padding-top: 2rem !important; }</style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">
    <!-- Header -->
    <header id="main-header" class="fixed top-0 z-50 w-full bg-white border-b border-brand/5 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-18 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center"><span class="text-white text-xs font-bold">온</span></div>
                    <span class="font-bold text-lg text-brand tracking-tight">온실(Onsil) <span id="admin-badge" class="hidden text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded ml-1">ADMIN</span></span>
                </a>
                <nav class="hidden md:flex items-center gap-1 border-l border-gray-100 pl-6 ml-2">
                    <a href="admin_reservations.html" id="nav-res" class="px-4 py-2 text-sm font-bold text-brand bg-brand/5 rounded-lg transition-all">예약 관리</a>
                    <a href="admin_partners.html" id="nav-partners" class="px-4 py-2 text-sm font-medium text-brand/70 hover:text-brand hover:bg-brand/5 rounded-lg transition-all">파트너 관리</a>
                    <a href="admin_funeral_homes.html" id="nav-homes" class="px-4 py-2 text-sm font-medium text-brand/70 hover:text-brand hover:bg-brand/5 rounded-lg transition-all">장례식장 관리</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div id="auth-container"></div>
                <button onclick="Auth.logout()" class="hidden sm:block px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-24">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 id="dashboard-title" class="text-2xl font-bold text-gray-900">예약 통합 관리</h1>
                <p class="text-gray-500 mt-1">실시간 예약 현황 및 파트너 수동 예약을 관리합니다.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openAddModal()" class="bg-onsil text-white px-5 py-2.5 rounded-xl font-bold hover:bg-[#7A6A59] transition-all flex items-center gap-2 shadow-lg"><i class="fas fa-plus"></i> 수동 예약 등록 (마감)</button>
                <button onclick="location.reload()" class="bg-white border border-gray-200 px-4 py-2.5 rounded-xl hover:bg-gray-50 transition-colors shadow-sm text-gray-600"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50/50 border-b border-gray-100">
                        <tr>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">상태</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">접수일시</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">시설명</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">예약 일정</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">보호자/아이</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider">연락처</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-wider text-center">작업</th>
                        </tr>
                    </thead>
                    <tbody id="reservation-list" class="divide-y divide-gray-50">
                        <tr><td colspan="7" class="px-6 py-20 text-center text-gray-400">불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Manual Add Modal -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeAddModal()"></div>
        <div class="bg-white w-full max-w-xl rounded-3xl p-8 relative z-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">수동 예약 등록 (시간 마감)</h2>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="add-res-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1.5">장례식장</label>
                        <select id="res-facility" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl" required></select>
                    </div>
                    <div><label class="block text-xs font-bold text-gray-500 mb-1.5">날짜</label><input type="date" id="res-date" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl" required></div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5">시간 (1시간 단위)</label>
                        <select id="res-time" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl" required>
                            <option value="09:00">09:00</option><option value="10:00">10:00</option><option value="11:00">11:00</option><option value="12:00">12:00</option><option value="13:00">13:00</option><option value="14:00">14:00</option><option value="15:00">15:00</option><option value="16:00">16:00</option><option value="17:00">17:00</option><option value="18:00">18:00</option><option value="19:00">19:00</option>
                        </select>
                    </div>
                </div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1.5">메모 (선택)</label><input type="text" id="res-memo" placeholder="예: 유선 예약 건, 시설 점검 등" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <p class="text-[11px] text-brand-warm font-bold">* 수동 예약 등록 시 해당 시간대는 고객 예약이 즉시 마감됩니다.</p>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeAddModal()" class="flex-1 py-4 bg-gray-100 rounded-2xl font-bold">취on 취소</button>
                    <button type="submit" class="flex-[2] py-4 bg-onsil text-white rounded-2xl font-bold">예약 등록 및 마감</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js?v=35"></script>
    <script>
        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

        async function checkAdminAccess() {
            try {
                const user = await Auth.getCurrentUser();
                if (!user) { location.href = 'index.html'; return; }
                const isAdmin = user.role === 'admin';
                const isPartner = user.role === 'partner';
                
                if (!isAdmin && !isPartner) { alert('접근 권한이 없습니다.'); location.href = 'index.html'; return; }
                
                if (isPartner) {
                    document.getElementById('nav-partners')?.classList.add('hidden');
                    document.getElementById('nav-homes')?.classList.add('hidden');
                }
                await initPage(user, isAdmin);
            } catch (err) { console.error(err); }
        }

        async function initPage(user, isAdmin) {
            const listContainer = document.getElementById('reservation-list');
            const facilitySelect = document.getElementById('res-facility');
            const sb = Auth.getSupabase();

            // Setup Facility Select
            if (!isAdmin && user.role === 'partner' && user.facility) {
                document.getElementById('dashboard-title').textContent = user.facility + ' 예약 관리';
                facilitySelect.innerHTML = \`<option value="\${user.facility}">\${user.facility}</option>\`;
            } else {
                facilitySelect.innerHTML = '<option value="">시설 선택</option><option value="스냅플러그">스냅플러그</option><option value="펫포레스트 남양주점">펫포레스트 남양주점</option><option value="별다만">별다만</option>';
            }

            let query = sb.from('reservations').select('*');
            if (!isAdmin && user.role === 'partner' && user.facility) {
                query = query.eq('facility_name', user.facility);
            }
            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) { listContainer.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-red-500">오류</td></tr>'; return; }
            if (!data || data.length === 0) { listContainer.innerHTML = '<tr><td colspan="7" class="py-20 text-center text-gray-400">내역 없음</td></tr>'; return; }

            listContainer.innerHTML = data.map(res => {
                const isPartner = res.booking_type === 'partner';
                const date = new Date(res.created_at).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                return \`
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-5"><span class="px-2 py-1 \${isPartner ? 'bg-brand-warm/10 text-brand-warm' : 'bg-green-50 text-green-600'} text-[10px] font-bold rounded">\${isPartner ? '수동(마감)' : '고객예약'}</span></td>
                        <td class="px-6 py-5 text-xs text-gray-400">\${date}</td>
                        <td class="px-6 py-5 font-bold text-gray-900">\${res.facility_name}</td>
                        <td class="px-6 py-5 text-sm font-bold text-primary">\${res.reservation_date} \${res.reservation_time}</td>
                        <td class="px-6 py-5 text-sm font-bold">\${res.user_name || '파트너'} / \${res.pet_name || '-'}</td>
                        <td class="px-6 py-5 text-sm">\${res.user_phone || '-'}</td>
                        <td class="px-6 py-5 text-center"><button onclick="deleteRes('\${res.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>
                \`;
            }).join('');
        }

        document.getElementById('add-res-form').onsubmit = async (e) => {
            e.preventDefault();
            const sb = Auth.getSupabase();
            const payload = {
                facility_name: document.getElementById('res-facility').value,
                reservation_date: document.getElementById('res-date').value,
                reservation_time: document.getElementById('res-time').value,
                user_name: '수동 등록',
                pet_name: document.getElementById('res-memo').value || '파트너 직접 예약',
                booking_type: 'partner'
            };
            const { error } = await sb.from('reservations').insert([payload]);
            if (error) alert('실패: ' + error.message);
            else location.reload();
        };

        async function deleteRes(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            const sb = Auth.getSupabase();
            const { error } = await sb.from('reservations').delete().eq('id', id);
            if (error) alert('실패: ' + error.message);
            else location.reload();
        }

        document.addEventListener('DOMContentLoaded', checkAdminAccess);
    </script>
</body>
</html>
