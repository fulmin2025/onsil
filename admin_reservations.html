<!DOCTYPE html>
<html lang="ko">

<head>
    <script>
        if (window.location.hostname === 'www.theonsil.co.kr') {
            window.location.replace('https://theonsil.co.kr' + window.location.pathname + window.location.search + window.location.hash);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리 대시보드 - 온실(Onsil) Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#1B2B48",
                        accent: "#C5A065",
                        onsil: "#8D7B68",
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="font-bold text-xl text-primary flex items-center gap-2">
                    <span class="text-onsil">온실(Onsil)</span> <span
                        class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500 font-normal">Admin</span>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <div id="auth-container"></div>
                <button
                    onclick="Auth.getCurrentUser().then(user => { if(user) location.href='search.html'; else { alert('예약은 로그인 후 이용 가능합니다.'); location.href='login.html'; } })"
                    class="bg-[#C5A065] text-white hover:bg-[#B08D55] px-4 py-2 rounded-md text-sm font-medium transition-colors shadow-md flex items-center gap-2">
                    <i class="fas fa-calendar-check"></i> 예약하기
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">예약 관리</h1>
                <p class="text-gray-500 mt-1">접수된 모든 장례 예약 내역을 실시간으로 확인할 수 있습니다.</p>
            </div>
            <button onclick="loadReservations()"
                class="inline-flex items-center gap-2 bg-white border px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors shadow-sm">
                <i class="fas fa-sync-alt"></i> 새로고침
            </button>
        </div>

        <!-- Reservation List -->
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">신청일시</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">장례식장</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">예약 일정</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">선택 서비스</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">반려동물 정보</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">보호자 연락처</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">상태</th>
                        </tr>
                    </thead>
                    <tbody id="reservation-list" class="divide-y divide-gray-100">
                        <!-- Items injected here -->
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-400">데이터를 불러오는 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function loadReservations() {
            const listContainer = document.getElementById('reservation-list');

            try {
                const sb = Auth.getSupabase();
                if (!sb) throw new Error("서버 연결 실패");

                const { data, error } = await sb
                    .from('reservations')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    listContainer.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">접수된 예약 내역이 없습니다.</td></tr>';
                    return;
                }

                listContainer.innerHTML = data.map(res => {
                    const date = new Date(res.created_at).toLocaleString();
                    const defaultPrices = {
                        '기본형': '250,000₩',
                        '고급형': '450,000₩',
                        'VIP형': '850,000₩'
                    };
                    const priceDisplay = res.service_price || defaultPrices[res.selected_service] || '';

                    return `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">${date}</td>
                            <td class="px-6 py-4">
                                <span class="font-bold text-gray-900">${res.facility_name}</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm">
                                    <p class="font-bold text-primary">${res.reservation_date}</p>
                                    <p class="text-gray-500">${res.reservation_time}</p>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1">
                                    <span class="px-3 py-1 bg-accent/10 text-accent rounded-full text-xs font-bold border border-accent/20 w-fit">
                                        ${res.selected_service || '미선택'}
                                    </span>
                                    ${priceDisplay ? `<span class="text-[10px] text-gray-400 font-bold ml-1">${priceDisplay}</span>` : ''}
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm">
                                    <span class="px-2 py-0.5 bg-onsil/10 text-onsil rounded text-xs font-bold mr-1">${res.pet_type}</span>
                                    <span class="font-bold">${res.pet_name}</span>
                                    <span class="text-gray-400">(${res.pet_weight}kg)</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 font-mono text-sm">${res.user_phone}</td>
                            <td class="px-6 py-4">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-800">
                                    접수완료
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                listContainer.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-red-500">데이터 로드 실패: ${err.message}</td></tr>`;
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', loadReservations);
    </script>
</body>

</html>
