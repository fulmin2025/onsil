<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장례 예약 - The 온실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#2C3E50', warm: '#D4A574', warmDark: '#B8894E', sage: '#87A08B' },
                        partner: "#1B2B48", primary: "#1B2B48", accent: "#D4A574", onsil: "#8D7B68"
                    },
                    fontFamily: { sans: ['Pretendard', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .date-btn.active { background-color: #8D7B68; color: white; border-color: #8D7B68; }
        .time-btn.active { background-color: #8D7B68; color: white; border-color: #8D7B68; }
        .time-btn:disabled { background-color: #f3f4f6; color: #d1d5db; border-color: #e5e7eb; cursor: not-allowed; pointer-events: none; }
        .step-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 1rem; color: #1a1a1a; }
        body { padding-top: 72px; }
        main { padding-top: 2rem !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-32">
    <!-- Header -->
    <header id="main-header" class="fixed top-0 z-50 w-full bg-white border-b border-brand/5">
        <div class="max-w-7xl mx-auto px-4 h-16 sm:h-18 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center"><span class="text-white text-xs font-bold">온</span></div>
                <span class="font-bold text-lg text-brand tracking-tight">온실(Onsil)</span>
            </a>
            <div class="flex items-center gap-3">
                <div id="auth-container"></div>
                <a href="tel:1551-5052" class="bg-brand-warm text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg flex items-center gap-2"><i class="fas fa-phone-alt"></i> 1551-5052</a>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto">
        <!-- Target Facility Info -->
        <div class="p-5 bg-white mb-2">
            <p class="text-primary text-sm font-bold mb-1">반려동물 장례 안심 예약</p>
            <h2 id="target-name" class="text-2xl font-bold text-gray-900">장례식장 정보를 불러오는 중...</h2>
            <div class="mt-3 p-3 bg-gray-50 rounded-lg border border-gray-100 flex items-center gap-2">
                <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary"><i class="fas fa-gift"></i></div>
                <div class="text-xs"><p class="font-bold text-gray-800">The 온실 예약 혜택</p><p class="text-gray-500">예약 시 4만원 상당의 추모 키트를 선물로 드려요.</p></div>
            </div>
        </div>

        <!-- Date Selection -->
        <div class="p-5 bg-white mb-2">
            <h3 class="step-title">날짜와 시간을 선택해주세요.</h3>
            <div class="flex gap-3 overflow-x-auto no-scrollbar py-2" id="date-container"></div>

            <div class="mt-6">
                <p class="text-sm font-bold mb-3 text-gray-700">예약 시간 (1시간 단위)</p>
                <div class="grid grid-cols-4 gap-2" id="time-container"></div>
                <p class="mt-3 text-[11px] text-gray-400">* 회색으로 표시된 시간은 예약이 완료된 시간입니다.</p>
            </div>
        </div>

        <!-- Service Selection -->
        <div class="p-5 bg-white mb-2">
            <h3 class="step-title">장례 서비스를 선택해주세요.</h3>
            <div class="space-y-3" id="service-container">
                <div class="py-12 text-center text-gray-400"><i class="fas fa-spinner fa-spin mb-2"></i><p class="text-xs">장례식장별 서비스를 불러오는 중...</p></div>
            </div>
        </div>

        <!-- Info Inputs (Pet/User) -->
        <div class="p-5 bg-white mb-2">
            <h3 class="step-title">정보를 입력해주세요.</h3>
            <div class="space-y-4">
                <div><label class="block text-xs font-bold text-gray-500 mb-1">아이 이름</label><input type="text" id="pet-name" placeholder="아이 이름을 입력해주세요" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div class="flex gap-3">
                    <div class="flex-1"><label class="block text-xs font-bold text-gray-500 mb-1">무게 (kg)</label><input type="number" id="pet-weight" placeholder="0.0" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl"></div>
                    <div class="flex-[2]"><label class="block text-xs font-bold text-gray-500 mb-1">종류</label><input type="text" id="pet-type" placeholder="강아지, 고양이 등" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl"></div>
                </div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">예약자 성함</label><input type="text" id="user-name" placeholder="성함을 입력해주세요" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">휴대폰 번호</label>
                    <div class="flex gap-2">
                        <input type="tel" id="user-phone" placeholder="010-0000-0000" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl">
                        <button id="request-verify-btn" class="px-4 py-3 bg-primary text-white font-bold rounded-xl text-sm transition-all">본인인증</button>
                    </div>
                </div>
                <div id="verify-success" class="hidden text-green-600 font-bold text-sm px-1"><i class="fas fa-check-circle"></i> 본인인증이 완료되었습니다.</div>
            </div>
        </div>

        <!-- Agreement -->
        <div class="p-5 bg-white">
            <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl border border-gray-100">
                <input type="checkbox" id="agree-all" class="w-5 h-5 accent-primary">
                <label for="agree-all" class="text-sm font-bold text-gray-700">약관 및 개인정보 수집 동의</label>
            </div>
        </div>
    </main>

    <!-- Bottom CTA -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 shadow-lg">
        <button id="submit-btn" class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg disabled:opacity-50 disabled:bg-gray-300" disabled>예약 신청하기</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script src="js/auth.js?v=35"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const facilityName = urlParams.get('id');
        let selectedService = "";
        let currentServices = [];
        let facilityCapacity = 1; // Default capacity
        let isVerified = false;

        // Capacity Map (To be updated later via DB)
        const CAPACITY_MAP = {
            "스냅플러그": 2,
            "펫포레스트 남양주점": 1,
            "별다만": 2,
            "어게인": 1
        };

        async function initPage() {
            if (!facilityName) { alert("잘못된 접근입니다."); location.href='search.html'; return; }
            document.getElementById('target-name').textContent = facilityName;
            facilityCapacity = CAPACITY_MAP[facilityName] || 1;

            const user = await Auth.getCurrentUser();
            if (!user) { alert("로그인이 필요합니다."); location.href='login.html'; return; }

            await loadFacilityData();
            generateDates();
            generateTimes();
            checkAvailability();
        }

        async function loadFacilityData() {
            try {
                const response = await fetch('manual_data.json?v=' + Date.now());
                const manualData = await response.json();
                let facilityData = manualData[facilityName];
                
                // If not found, try flexible matching (e.g., removing 'v', trimming, case-insensitive)
                if (!facilityData) {
                    const cleanName = facilityName.replace(/v$/, '').trim();
                    const foundKey = Object.keys(manualData).find(k => 
                        k.trim() === cleanName || 
                        k.includes(cleanName) || 
                        cleanName.includes(k)
                    );
                    if (foundKey) {
                        facilityData = manualData[foundKey];
                        console.log(`Matched facility "${facilityName}" to "${foundKey}"`);
                    }
                }

                if (facilityData && facilityData.prices) {
                    // Filter for 'package' or relevant categories with expanded keywords
                    const keywords = ['장례', '패키지', '비용', '요금', '화장', '서비스', '베이직', '프리미엄'];
                    const filteredCategories = facilityData.prices.filter(p => 
                        p.category && keywords.some(k => p.category.includes(k))
                    );

                    let rawItems = [];
                    if (filteredCategories.length > 0) {
                        filteredCategories.forEach(cat => {
                            if (cat.items) rawItems = rawItems.concat(cat.items);
                        });
                    } else if (facilityData.prices.length > 0) {
                        // Fallback: If no keyword matches, take all items
                        facilityData.prices.forEach(cat => {
                            if (cat.items) rawItems = rawItems.concat(cat.items);
                        });
                    }

                    if (rawItems.length > 0) {
                        currentServices = rawItems.map(item => ({
                            name: item.name,
                            price: item.price,
                            desc: item.desc || (item.name.includes('기본') || item.name.includes('베이직') ? '개별 화장 + 추모실 + 기본 소모품' : '고급 유골함 + 염습 + 수의 포함')
                        }));
                    }
                }
                
                if (currentServices.length === 0) {
                    console.warn(`No services found for ${facilityName}, using fallback.`);
                    currentServices = [
                        { name: "기본 장례 서비스", price: "200,000원", desc: "개별화장 + 추모실 + 유골함" },
                        { name: "프리미엄 패키지", price: "450,000원", desc: "기본 + 수의 + 고급관 + 꽃장식" }
                    ];
                }
                renderServices();
            } catch (err) { console.error("Load Data Error:", err); }
        }

        function renderServices() {
            const container = document.getElementById('service-container');
            container.innerHTML = currentServices.map((s, idx) => `
                <div class="service-card p-4 border border-gray-200 rounded-2xl cursor-pointer hover:border-primary/50 flex items-center justify-between group" data-service="${s.name}" data-price="${s.price}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center text-gray-400 group-[.active]:text-primary"><i class="fas fa-leaf"></i></div>
                        <div>
                            <div class="flex items-center gap-2"><p class="font-bold text-gray-900">${s.name}</p><span class="text-[10px] px-1.5 py-0.5 bg-gray-100 rounded font-bold">${s.price}</span></div>
                            <p class="text-[11px] text-gray-500">${s.desc || ''}</p>
                        </div>
                    </div>
                    <div class="w-6 h-6 border-2 border-gray-200 rounded-full flex items-center justify-center group-[.active]:bg-primary group-[.active]:border-primary"><i class="fas fa-check text-[10px] text-white"></i></div>
                </div>
            `).join('');

            document.querySelectorAll('.service-card').forEach(card => {
                card.onclick = () => {
                    document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedService = card.dataset.service;
                    validateForm();
                };
            });
        }

        function generateDates() {
            const container = document.getElementById('date-container');
            const days = ["일", "월", "화", "수", "목", "금", "토"];
            const now = new Date();
            for (let i = 0; i < 7; i++) {
                const d = new Date(); d.setDate(now.getDate() + i);
                const dateStr = \`\${d.getFullYear()}-\${String(d.getMonth()+1).padStart(2,'0')}-\${String(d.getDate()).padStart(2,'0')}\`;
                const btn = document.createElement('button');
                btn.className = \`date-btn shrink-0 flex flex-col items-center justify-center w-16 h-20 rounded-2xl border transition-all \${i===0?'active':'bg-white border-gray-200'}\`;
                btn.dataset.date = dateStr;
                btn.innerHTML = \`<span class="text-xs mb-1">\${d.getMonth()+1}.\${d.getDate()}(\${i===0?'오늘':i===1?'내일':days[d.getDay()]})</span><span class="text-lg font-bold">\${d.getDate()}</span>\`;
                btn.onclick = () => {
                    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    checkAvailability();
                    validateForm();
                };
                container.appendChild(btn);
            }
        }

        function generateTimes() {
            const container = document.getElementById('time-container');
            const times = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00"];
            times.forEach(t => {
                const btn = document.createElement('button');
                btn.className = "time-btn py-3 border border-gray-200 rounded-xl text-sm font-medium transition-all bg-white hover:border-primary/50";
                btn.textContent = t;
                btn.onclick = () => {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    validateForm();
                };
                container.appendChild(btn);
            });
        }

        async function checkAvailability() {
            const selectedDate = document.querySelector('.date-btn.active')?.dataset.date;
            if (!selectedDate || !facilityName) return;

            document.querySelectorAll('.time-btn').forEach(btn => btn.disabled = false);

            try {
                const sb = Auth.getSupabase();
                const { data, error } = await sb.from('reservations').select('reservation_time, booking_type').eq('facility_name', facilityName).eq('reservation_date', selectedDate);
                if (error) throw error;

                const counts = {};
                const partnerBlocked = new Set();

                data.forEach(r => {
                    counts[r.reservation_time] = (counts[r.reservation_time] || 0) + 1;
                    if (r.booking_type === 'partner') partnerBlocked.add(r.reservation_time);
                });

                document.querySelectorAll('.time-btn').forEach(btn => {
                    const time = btn.textContent;
                    const count = counts[time] || 0;
                    // Block if partner reserved OR count reaches capacity
                    if (partnerBlocked.has(time) || count >= facilityCapacity) {
                        btn.disabled = true;
                        btn.classList.remove('active');
                    }
                });
            } catch (err) { console.error("Check Error:", err); }
        }

        function validateForm() {
            const petName = document.getElementById('pet-name').value;
            const agree = document.getElementById('agree-all').checked;
            const timeSelected = document.querySelector('.time-btn.active');
            const isComplete = petName && agree && timeSelected && isVerified && selectedService;
            document.getElementById('submit-btn').disabled = !isComplete;
        }

        document.getElementById('request-verify-btn').onclick = async () => {
            const phone = document.getElementById('user-phone').value;
            const name = document.getElementById('user-name').value;
            if (!phone || !name) { alert("성함과 연락처를 입력해주세요."); return; }
            const res = await Auth.requestIdentityVerification({ fullName: name, phoneNumber: phone });
            if (res.success) {
                isVerified = true;
                document.getElementById('verify-success').classList.remove('hidden');
                document.getElementById('request-verify-btn').classList.add('hidden');
                validateForm();
            } else { alert(res.message); }
        };

        document.getElementById('submit-btn').onclick = async () => {
            const btn = document.getElementById('submit-btn');
            const user = await Auth.getCurrentUser();
            const date = document.querySelector('.date-btn.active').dataset.date;
            const time = document.querySelector('.time-btn.active').textContent;
            
            btn.disabled = true;
            btn.textContent = "결제창 로딩 중...";

            try {
                const sb = Auth.getSupabase();
                // Final Availability Check
                const { data: exist } = await sb.from('reservations').select('booking_type').eq('facility_name', facilityName).eq('reservation_date', date).eq('reservation_time', time);
                const isBlocked = exist.some(r => r.booking_type === 'partner') || exist.length >= facilityCapacity;
                if (isBlocked) { alert("죄송합니다. 방금 예약이 마감되었습니다."); location.reload(); return; }

                const paymentId = \`payment-\${crypto.randomUUID()}\`;
                const response = await PortOne.requestPayment({
                    storeId: Auth.PORTONE_STORE_ID, channelKey: Auth.PORTONE_CHANNEL_KEY, paymentId,
                    orderName: \`온실 예약: \${selectedService}\`, totalAmount: 100, currency: "CURRENCY_KRW", payMethod: "CARD",
                    customer: { fullName: document.getElementById('user-name').value, phoneNumber: document.getElementById('user-phone').value }
                });

                if (response.code) throw new Error(response.message);

                const resData = {
                    facility_name: facilityName, reservation_date: date, reservation_time: time,
                    user_name: document.getElementById('user-name').value, pet_name: document.getElementById('pet-name').value,
                    pet_weight: document.getElementById('pet-weight').value, pet_type: document.getElementById('pet-type').value,
                    user_phone: document.getElementById('user-phone').value, selected_service: selectedService,
                    service_price: document.querySelector('.service-card.active').dataset.price, user_id: user.id,
                    booking_type: 'customer', payment_status: 'paid'
                };

                const { error } = await sb.from('reservations').insert([resData]);
                if (error) throw error;

                alert("예약이 완료되었습니다.");
                location.href = 'index.html';
            } catch (err) { alert(err.message); btn.disabled = false; btn.textContent = "예약 신청하기"; }
        };

        document.addEventListener('DOMContentLoaded', initPage);
        ['pet-name', 'pet-weight', 'pet-type', 'user-name', 'user-phone', 'agree-all'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.oninput = validateForm;
        });
    </script>
</body>
</html>
